<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - SOLO CONFINI NAZIONALI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; overflow: hidden; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #333; z-index: 1001; position: relative; }
        #map { height: calc(100vh - 60px); width: 100%; background: #000; cursor: crosshair; }
        .stats { font-weight: bold; line-height: 1.2; }
        .area-info { font-size: 0.75em; color: #ffa500; display: block; }
        .legend { background: rgba(255,255,255,0.95); padding: 10px; border-radius: 8px; font-size: 11px; color: #333; box-shadow: 0 0 15px rgba(0,0,0,0.4); }
        .legend b { display: block; margin-bottom: 5px; border-bottom: 1px solid #ddd; }
        .legend i { width: 12px; height: 12px; display: inline-block; margin-right: 5px; border-radius: 2px; vertical-align: middle; }
        .fire-marker { width: 30px !important; height: 30px !important; display: flex; align-items: center; justify-content: center; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.4); opacity: 0.1; } 100% { transform: scale(0.8); opacity: 0.8; } }
        .pulse { width: 30px; height: 30px; border-radius: 50%; position: absolute; animation: pulse 1.8s infinite; pointer-events: none; }
        .btn-news { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-refresh { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-report { background: #e67e22; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #report-panel, #auth-panel { position: fixed; top: 70px; left: 20px; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; z-index: 2000; display: none; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, select { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; border-radius: 4px; border: none; }
        label { font-size: 11px; color: #bdc3c7; display: block; margin-bottom: 4px; }
        .close-btn { float: right; cursor: pointer; color: #e74c3c; font-weight: bold; }
        .auth-toggle { font-size: 11px; color: #3498db; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <div class="stats">
        🇮🇹 MONITORAGGIO ITALIA: <span id="count">...</span>
        <span class="area-info" id="area">Confini Nazionali Protetti</span>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-report" onclick="checkAccessForReport()"><i class="fas fa-bullhorn"></i> SEGNALA</button>
        <button class="btn-news" onclick="openNews()">NOTIZIE RAPIDE</button>
        <button class="btn-refresh" onclick="loadFires()"><i class="fas fa-sync"></i> REFRESH</button>
        <div id="login-zone">
            <button onclick="toggleAuth()" style="padding: 7px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">ACCEDI</button>
        </div>
    </div>
</header>

<div id="auth-panel">
    <span class="close-btn" onclick="toggleAuth()">✖</span>
    <h3 id="auth-title">ACCESSO UTENTE</h3>
    <input type="email" id="auth-email" placeholder="La tua email">
    <input type="password" id="auth-pass" placeholder="Password">
    <button onclick="handleAuth()" id="auth-btn" style="width:100%; background:#e74c3c; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer; font-weight:bold; margin-bottom:10px;">ENTRA</button>
    <span class="auth-toggle" id="auth-switch" onclick="switchAuthMode()">Crea un nuovo account</span>
</div>

<div id="report-panel">
    <span class="close-btn" onclick="toggleReport()">✖</span>
    <h3>NUOVA SEGNALAZIONE</h3>
    <label>1. Clicca sulla mappa per le coordinate</label>
    <input type="text" id="rep-coords" placeholder="Lat, Lon" readonly required>
    <label>2. Tipo di incendio (Obbligatorio)</label>
    <select id="rep-type" required>
        <option value="">-- Seleziona --</option>
        <option value="Boschivo">Boschivo</option>
        <option value="Interfaccia">Interfaccia</option>
        <option value="Sterpaglie">Sterpaglie</option>
    </select>
    <label>3. Foto (Obbligatorio)</label>
    <input type="file" id="rep-photo" accept="image/*" required>
    <button onclick="submitManualReport()" style="width:100%; background:#2ecc71; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer; font-weight:bold;">INVIA</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [42.0, 12.5], zoom: 6, preferCanvas: true });
    const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
    
    const firesLayer = L.layerGroup().addTo(map);
    const manualLayer = L.layerGroup().addTo(map);
    const baseLayers = { "🛰️ Vista Satellitare": sat, "⛰️ Mappa Topografica": topo };
    L.control.layers(baseLayers, null, {collapsed: false, position: 'topright'}).addTo(map);

    let currentUser = null;
    let authMode = 'login';

    const blacklist = [[37.13, 15.21], [44.91, 8.89], [40.63, 14.92], [42.09, 11.82], [45.45, 12.23], [37.15, 14.23], [40.48, 17.22], [43.60, 13.36], [44.43, 8.75], [43.58, 10.34], [39.11, 9.04], [40.627, 18.003], [40.514, 17.206], [37.211, 15.170], [37.438, 15.031], [38.792, 15.213], [41.695, 13.142], [39.075, 9.018], [39.212, 8.406], [40.554, 9.672], [42.566, 12.672], [43.363, 12.547], [43.852, 12.781], [44.678, 10.851], [45.145, 9.941], [45.458, 10.457], [45.528, 9.799], [45.412, 9.116], [45.485, 9.039], [45.639, 9.605], [45.642, 9.260], [45.782, 8.682]];

    // --- FILTRO GEOGRAFICO BLINDATO ---
    function isWithinItaly(lat, lon) {
        // 1. Taglio Nord Africa (Tutto sotto Lampedusa fuori)
        if (lat < 36.6) return false;
        
        // 2. Taglio Ovest (Francia)
        if (lon < 6.6) return false;
        
        // 3. Taglio Corsica e Sardegna Ovest
        if (lon < 8.2 && lat > 41.2) return false;
        if (lon > 8.5 && lon < 9.6 && lat > 41.3 && lat < 43.1) return false;

        // 4. Taglio Est (Balcani/Slovenia)
        if (lon > 13.6 && lat > 45.4) return false; // Confine Trieste
        if (lon > 13.9 && lat > 44.5) return false; // Confine Istria
        if (lon > 15.0 && lat > 42.5) return false; // Mare Adriatico centrale
        if (lon > 18.5) return false; // Oltre la Puglia

        // 5. Taglio Nord (Svizzera/Austria)
        if (lat > 47.1) return false;
        if (lat > 46.6 && lon < 10.4 && lon > 8.0) return false; // Blocca specificamente la Svizzera centrale

        // 6. Blacklist Industriale
        return !blacklist.some(s => Math.abs(s[0] - lat) < 0.04 && Math.abs(s[1] - lon) < 0.04);
    }

    // --- AUTENTICAZIONE ---
    function toggleAuth() {
        const p = document.getElementById('auth-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function switchAuthMode() {
        authMode = (authMode === 'login') ? 'register' : 'login';
        document.getElementById('auth-title').innerText = (authMode === 'login') ? 'ACCESSO UTENTE' : 'REGISTRAZIONE';
        document.getElementById('auth-btn').innerText = (authMode === 'login') ? 'ENTRA' : 'CREA ACCOUNT';
        document.getElementById('auth-switch').innerText = (authMode === 'login') ? 'Crea un nuovo account' : 'Hai già un account? Accedi';
    }

    function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if(!email || !pass) return alert("Dati mancanti!");
        if(authMode === 'register') {
            localStorage.setItem('u_' + email, pass);
            alert("Registrato! Ora accedi.");
            switchAuthMode();
        } else {
            if(localStorage.getItem('u_' + email) === pass) {
                currentUser = email;
                document.getElementById('login-zone').innerHTML = `<b style='color:#2ecc71'>ID: ${email.split('@')[0]}</b>`;
                toggleAuth();
            } else { alert("Errore login!"); }
        }
    }

    function checkAccessForReport() {
        if(!currentUser) { alert("Devi registrarti per segnalare!"); toggleAuth(); }
        else { toggleReport(); }
    }

    function toggleReport() {
        const p = document.getElementById('report-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    map.on('click', function(e) {
        if(document.getElementById('report-panel').style.display === 'block') {
            document.getElementById('rep-coords').value = e.latlng.lat.toFixed(4) + ", " + e.latlng.lng.toFixed(4);
        }
    });

    function submitManualReport() {
        const coords = document.getElementById('rep-coords').value;
        const type = document.getElementById('rep-type').value;
        if(!coords || !type || !document.getElementById('rep-photo').files[0]) return alert("Campi obbligatori!");
        const [lat, lon] = coords.split(',').map(Number);
        L.marker([lat, lon], {
            icon: L.divIcon({ className: 'fire-marker', html: `<div class="pulse" style="border:2px solid #9b59b6"></div><i class="fas fa-user-shield" style="color:#9b59b6; font-size:18px;"></i>` })
        }).addTo(manualLayer).bindPopup(`<b>REPORT DI ${currentUser}</b><br>Tipo: ${type}`);
        toggleReport();
    }

    async function loadFires() {
        try {
            const response = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1"));
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            firesLayer.clearLayers();
            let count = 0;
            rows.forEach(row => {
                const d = row.split(',');
                if (d.length < 3) return;
                const lat = parseFloat(d[0]), lon = parseFloat(d[1]);
                if (isWithinItaly(lat, lon)) {
                    count++;
                    const tempC = (parseFloat(d[2]) - 273.15).toFixed(1);
                    const color = tempC > 67 ? "#e74c3c" : (tempC > 52 ? "#e67e22" : "#f1c40f");
                    L.marker([lat, lon], {
                        icon: L.divIcon({ className: 'fire-marker', html: `<div class="pulse" style="border:1px solid ${color}"></div><i class="fas fa-fire" style="color:${color}; font-size:16px;"></i>` })
                    }).addTo(firesLayer).bindPopup(`<b>NASA ALERT</b><br>Temp: ${tempC}°C`);
                }
            });
            document.getElementById('count').innerText = `${count} Alert Operativi`;
            document.getElementById('area').innerText = `Area: ${(count * 14.06).toFixed(2)} ha`;
        } catch (e) { console.error(e); }
    }

    function openNews() {
        window.open("https://www.vigilfuoco.it/media/notizie/dal-territorio", '_blank');
    }

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<b>LEGENDA</b><div><i style="background: #e74c3c"></i> Critico</div><div><i style="background: #9b59b6"></i> Segnalazione</div>`;
        return div;
    };
    legend.addTo(map);

    loadFires();
    setInterval(loadFires, 600000);
</script>
</body>
</html>
