<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrale Italia Unica</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        .login-box input { padding: 8px; border-radius: 4px; border: 1px solid #444; }
        .login-box button { padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .legend { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); line-height: 20px; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; }
    </style>
</head>
<body>

<header>
    <div id="stat">🇮🇹 CENTRALE ITALIA: <span id="count">Inserire Codice</span></div>
    <div id="login-section" class="login-box">
        <input type="password" id="operator-code" placeholder="Codice Operatore">
        <button onclick="checkAuth()">ENTRA</button>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const nasaLayer = L.layerGroup().addTo(map);
    const cloudLayer = L.layerGroup().addTo(map);

    window.checkAuth = function() {
        if (document.getElementById('operator-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ STAFF ATTIVO</b>";
            loadData();
        } else { alert("Codice errato!"); }
    };

    async function loadData() {
        // Pulizia totale prima di iniziare
        nasaLayer.clearLayers();
        
        // 1. CARICAMENTO NASA CON FILTRO CHIRURGICO
        try {
            const res = await fetch(`https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1`);
            const csv = await res.text();
            const lines = csv.split('\n');
            let n = 0;

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(',');
                if (c.length < 3) continue;

                const lat = parseFloat(c[0]);
                const lon = parseFloat(c[1]);
                const bright = parseFloat(c[2]);

                // FILTRO ITALIA: Solo punti dentro questi confini
                if (lat > 35.5 && lat < 47.1 && lon > 6.6 && lon < 18.5) {
                    const temp = (bright - 273.15).toFixed(0);
                    L.marker([lat, lon], {
                        icon: L.divIcon({ html: `<i class="fas fa-fire" style="color:${temp > 50 ? 'red' : 'orange'}; font-size:16px;"></i>`, className: 'f' })
                    }).addTo(nasaLayer).bindPopup(`Incendio Italia: ${temp}°C`);
                    n++;
                }
            }
            document.getElementById('count').innerText = `${n} Incendi in Italia`;
        } catch (err) { console.error("Errore NASA"); }

        // 2. CARICAMENTO CLOUD
        onSnapshot(collection(db, "segnalazioni"), (snap) => {
            cloudLayer.clearLayers();
            snap.forEach(d => {
                const s = d.data();
                L.marker([s.lat, s.lon], {
                    icon: L.divIcon({ html: `<i class="fas fa-camera" style="color:purple; font-size:18px;"></i>`, className: 'c' })
                }).addTo(cloudLayer).bindPopup(s.desc);
            });
        });

        // Aggiungi Legenda
        const leg = L.control({position: 'bottomright'});
        leg.onAdd = () => {
            const d = L.DomUtil.create('div', 'legend');
            d.innerHTML = '<b>LEGENDA</b><br><i class="fas fa-fire" style="color:red"></i> Critico<br><i class="fas fa-fire" style="color:orange"></i> Moderato<br><i class="fas fa-camera" style="color:purple"></i> Cloud';
            return d;
        };
        leg.addTo(map);
    }

    map.on('click', async (e) => {
        if (document.getElementById('login-section').innerHTML.includes("STAFF")) {
            const txt = prompt("Descrizione incendio:");
            if (txt) await addDoc(collection(db, "segnalazioni"), { lat: e.latlng.lat, lon: e.latlng.lng, desc: txt });
        }
    });
</script>
</body>
</html>
