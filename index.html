<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - SISTEMA INTEGRATO PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #333; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        #stat { font-weight: bold; font-size: 1.1em; color: #fff; line-height: 1.2; }
        .sub-stat { font-size: 0.7em; color: #ffa500; display: block; }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 0.2; }
            100% { transform: scale(0.8); opacity: 0.8; }
        }
        .fire-pulse {
            width: 40px; height: 40px; border-radius: 50%;
            position: absolute; margin-left: -10px; margin-top: -10px;
            animation: pulse 1.5s infinite; pointer-events: none;
        }

        .info.legend {
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3); line-height: 18px; font-size: 11px;
            max-width: 220px; color: #333;
        }
        .legend b { display: block; margin-bottom: 6px; border-bottom: 1px solid #ddd; padding-bottom: 3px; font-size: 12px; color: #000; }
        .legend-section { margin-bottom: 10px; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 3px; opacity: 0.9; }
        
        .weather-widget { border-top: 1px solid #ddd; margin-top: 8px; padding-top: 8px; }
        .risk-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; color: white; font-weight: bold; margin-top: 5px; font-size: 10px; }
        .btn-news { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-login { padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div id="stat">
        🇮🇹 MONITORAGGIO ITALIA: <span id="count">...</span>
        <span class="sub-stat" id="area-est">Calcolo superficie stimata...</span>
    </div>
    <div style="display: flex; align-items: center;">
        <button class="btn-news" onclick="openNewsMenu()">NOTIZIE RAPIDE</button>
        <div id="login-section">
            <input type="password" id="operator-code" placeholder="Codice" style="padding:8px; border-radius:4px; border:1px solid #444; background:#333; color:white; width:90px; margin-right: 5px;">
            <button class="btn-login" onclick="checkAuth()">ENTRA</button>
        </div>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
    const topografica = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });
    const map = L.map('map', { center: [42.0, 12.5], zoom: 6, layers: [satellite] });
    const nasaLayer = L.layerGroup().addTo(map);

    const baseMaps = { "🛰️ Vista Satellitare": satellite, "⛰️ Mappa Topografica": topografica };
    L.control.layers(baseMaps, { "🔥 Incendi NASA": nasaLayer }, { collapsed: false }).addTo(map);

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'info legend');
        div.innerHTML = `
            <div class="legend-section">
                <b>TIPOLOGIA ALERT</b>
                <div><i class="fas fa-fire" style="color:#ff4500; font-size:12px; background:none;"></i> Incendio Attivo</div>
            </div>
            <div class="legend-section">
                <b>INTENSITÀ (RILEVATA)</b>
                <div><i style="background:#c0392b"></i> Critico / Alto</div>
                <div><i style="background:#e67e22"></i> Moderato / Medio</div>
                <div><i style="background:#f1c40f"></i> Basso / Analisi</div>
            </div>
        `;
        return div;
    };
    legend.addTo(map);

    function toDMS(deg, pos, neg) {
        const abs = Math.abs(deg);
        const d = Math.floor(abs), m = Math.floor((abs-d)*60), s = ((abs-d-m/60)*3600).toFixed(1);
        return `${d}°${m}'${s}"${deg >= 0 ? pos : neg}`;
    }

    const blacklist = [{lat:41.13, lon:15.45}, {lat:42.04, lon:14.72}, {lat:44.78, lon:10.73}];
    function isOutsideItaly(lat, lon) {
        if (lat < 35.4 || lat > 47.1 || lon < 6.6 || lon > 18.6) return true;
        return false;
    }

    async function loadNasaData() {
        try {
            // Utilizzo diretto senza proxy se possibile, o proxy più stabile
            const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1')}`);
            const csv = await res.text();
            const lines = csv.split('\n');
            let nReal = 0;

            nasaLayer.clearLayers();

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(',');
                if (c.length < 3) continue;
                const lat = parseFloat(c[0]), lon = parseFloat(c[1]);
                const conf = c[8] || "n"; // Confidenza NASA
                
                if (isOutsideItaly(lat, lon)) continue;

                nReal++;
                // ASSEGNAZIONE COLORE IMMEDIATA (NIENTE PIÙ GRIGIO FISSO)
                let color = "#f1c40f"; // Default Giallo
                if (conf === "h") color = "#c0392b"; // Rosso se alta confidenza
                if (conf === "n") color = "#e67e22"; // Arancione se normale

                const marker = L.marker([lat, lon], {
                    icon: L.divIcon({
                        html: `<div class="fire-pulse" style="background:${color}66; border:2px solid ${color}"></div><i class="fas fa-fire" style="color:${color}; font-size:20px; position:relative; z-index:10; text-shadow: 0 0 3px #000;"></i>`,
                        className: 'fire-marker', iconSize:[20,20], iconAnchor:[10,10]
                    })
                }).addTo(nasaLayer);

                marker.bindPopup(`
                    <div style="font-size:11px; width:195px;">
                        <b>SITO:</b> Vegetazione/Bosco<br>
                        <b>AREA:</b> ~14 ha<br>
                        <b>COORDS:</b> ${toDMS(lat,'N','S')} ${toDMS(lon,'E','W')}
                        <div class="weather-widget">Parametri ambientali attivi.</div>
                    </div>`);
            }
            document.getElementById('count').innerText = `${nReal} Alert Operativi`;
            document.getElementById('area-est').innerText = `Superficie stimata: ${(nReal * 14.06).toFixed(2)} ha`;
        } catch (e) { console.error("Errore"); }
    }

    window.openNewsMenu = () => {
        const s = prompt("1-Vigilfuoco | 2-Prot. Civile", "1");
        if(s === "1") window.open("https://www.vigilfuoco.it", "_blank");
    };

    window.checkAuth = () => {
        if (document.getElementById('operator-code').value === "GABRIELE_STAFF") {
            alert("Operatore Identificato");
        }
    };

    loadNasaData();
    setInterval(loadNasaData, 600000);
</script>
</body>
</html>
