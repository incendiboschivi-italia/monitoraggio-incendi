<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - SOLO CONFINI NAZIONALI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; overflow: hidden; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #333; z-index: 1001; position: relative; }
        #map { height: calc(100vh - 60px); width: 100%; background: #000; }
        .stats { font-weight: bold; line-height: 1.2; }
        .area-info { font-size: 0.75em; color: #ffa500; display: block; }
        .legend { background: rgba(255,255,255,0.95); padding: 10px; border-radius: 8px; font-size: 11px; color: #333; box-shadow: 0 0 15px rgba(0,0,0,0.4); }
        .legend b { display: block; margin-bottom: 5px; border-bottom: 1px solid #ddd; }
        .legend i { width: 12px; height: 12px; display: inline-block; margin-right: 5px; border-radius: 2px; vertical-align: middle; }
        .fire-marker { width: 30px !important; height: 30px !important; display: flex; align-items: center; justify-content: center; will-change: transform; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.4); opacity: 0.1; } 100% { transform: scale(0.8); opacity: 0.8; } }
        .pulse { width: 30px; height: 30px; border-radius: 50%; position: absolute; animation: pulse 1.8s infinite; pointer-events: none; }
        .btn-news { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-refresh { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="stats">
        🇮🇹 MONITORAGGIO ITALIA: <span id="count">...</span>
        <span class="area-info" id="area">Sistema di filtraggio confini attivo...</span>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-news" onclick="openNews()">NOTIZIE RAPIDE</button>
        <button class="btn-refresh" onclick="loadFires()"><i class="fas fa-sync"></i> REFRESH</button>
        <div id="login-zone">
            <input type="password" id="op-code" placeholder="Staff" style="padding:7px; border-radius:4px; border:1px solid #444; background:#333; color:white; width:70px;">
            <button onclick="checkAuth()" style="padding: 7px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">ENTRA</button>
        </div>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [42.0, 12.5], zoom: 6, preferCanvas: true });
    const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
    
    const firesLayer = L.layerGroup().addTo(map);
    const baseLayers = { "🛰️ Vista Satellitare": sat, "⛰️ Mappa Topografica": topo };
    L.control.layers(baseLayers, null, {collapsed: false, position: 'topright'}).addTo(map);

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<b>LIVELLO TERMICO (°C)</b>
            <div><i style="background: #e74c3c"></i> Critico (> 67°C)</div>
            <div><i style="background: #e67e22"></i> Elevato (52°C - 67°C)</div>
            <div><i style="background: #f1c40f"></i> Moderato (< 52°C)</div>`;
        return div;
    };
    legend.addTo(map);

    const blacklist = [[37.13, 15.21], [44.91, 8.89], [40.63, 14.92], [42.09, 11.82], [45.45, 12.23], [37.15, 14.23], [40.48, 17.22], [43.60, 13.36], [44.43, 8.75], [43.58, 10.34], [39.11, 9.04], [40.627, 18.003], [40.514, 17.206], [37.211, 15.170], [37.438, 15.031], [38.792, 15.213], [41.695, 13.142], [39.075, 9.018], [39.212, 8.406], [40.554, 9.672], [42.566, 12.672], [43.363, 12.547], [43.852, 12.781], [44.678, 10.851], [45.145, 9.941], [45.458, 10.457], [45.528, 9.799], [45.412, 9.116], [45.485, 9.039], [45.639, 9.605], [45.642, 9.260], [45.782, 8.682]];

    function isWithinItaly(lat, lon) {
        // --- FILTRI CHIRURGICI ANTI-AFRICA ---
        // (Riferimento image_c61ee8.jpg: Algeria e Tunisia cerchiate in nero)
        
        // 1. RIMOZIONE NORD AFRICA (Tunisia/Libia/Algeria costiera)
        // Alziamo il limite sud a 36.6° Nord per tagliare fuori Capo Bon e Biserta
        if (lat < 36.6) return false; 

        // 2. RIMOZIONE FRANCIA / SVIZZERA / BALCANI / CORSICA
        // Manteniamo questi filtri di sicurezza stabiliti in precedenza
        if (lon > 8.5 && lon < 9.6 && lat > 41.3 && lat < 43.1) return false; // Corsica
        if (lon > 13.7) {
            if (lat > 45.1) return false; // Istria/Slovenia
            if (lat < 44.5 && lon > 14.5) return false; // Costa Dalmata
            if (lat < 42.0 && lon > 16.2) return false; // Albania/Montenegro
        }
        if (lat > 46.8 || lon < 6.6) return false; // Oltre Alpi ovest/nord

        // 3. FILTRO BOX GENERALE ITALIA (Base di sicurezza)
        if (lat < 35.4 || lat > 47.1 || lon < 6.6 || lon > 18.5) return false;

        // 4. FILTRO BLACKLIST INDUSTRIALE (32 siti)
        return !blacklist.some(s => Math.abs(s[0] - lat) < 0.05 && Math.abs(s[1] - lon) < 0.05);
    }

    async function loadFires() {
        document.getElementById('area').innerText = "Bonifica coste africane...";
        try {
            const response = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1"));
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            firesLayer.clearLayers();
            let count = 0;
            rows.forEach(row => {
                const d = row.split(',');
                if (d.length < 3) return;
                const lat = parseFloat(d[0]), lon = parseFloat(d[1]);
                if (isWithinItaly(lat, lon)) {
                    count++;
                    const tempC = (parseFloat(d[2]) - 273.15).toFixed(1);
                    const color = tempC > 67 ? "#e74c3c" : (tempC > 52 ? "#e67e22" : "#f1c40f");
                    L.marker([lat, lon], {
                        icon: L.divIcon({
                            className: 'fire-marker',
                            iconSize: [30, 30],
                            iconAnchor: [15, 15],
                            html: `<div class="pulse" style="border:1px solid ${color}"></div><i class="fas fa-fire" style="color:${color}; font-size:16px; text-shadow:0 0 3px #000;"></i>`
                        })
                    }).addTo(firesLayer).bindPopup(`<b>ALERT</b><br>Temp: ${tempC}°C`);
                }
            });
            document.getElementById('count').innerText = `${count} Alert Operativi`;
            document.getElementById('area').innerText = `Superficie Italia: ${(count * 14.06).toFixed(2)} ha`;
        } catch (e) { document.getElementById('area').innerText = "Errore NASA."; }
    }

    function openNews() {
        const choice = prompt("1-Vigilfuoco | 2-Prot. Civile | 3-AIB | 4-Meteo", "1");
        const urls = {"1": "https://www.vigilfuoco.it/media/notizie/dal-territorio", "2": "https://www.iononrischio.gov.it", "3": "http://www.pcn.minambiente.it", "4": "http://www.meteoam.it"};
        if(urls[choice]) window.open(urls[choice], '_blank');
    }

    function checkAuth() {
        if(document.getElementById('op-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-zone').innerHTML = "<b style='color:#2ecc71'>⭐ OPERATIVO</b>";
        }
    }
    loadFires();
    setInterval(loadFires, 600000);
</script>
</body>
</html>
