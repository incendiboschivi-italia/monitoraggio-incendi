<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoraggio Incendi Italia - Real Time</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; }
        header {
            height: 60px; background: #2c3e50; color: white;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .login-box input { padding: 5px; border-radius: 4px; border: none; margin-right: 5px; }
        .login-box button { padding: 5px 15px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 4px; }
        .info.legend {
    padding: 10px;
    background: white;
    background: rgba(255,255,255,0.9);
    line-height: 18px;
    color: #333;
    border-radius: 5px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
.info.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.7;
}
    </style>
</head>
<body>

<header>
    <div>🔥 INCENDI ITALIA LIVE: <span id="fire-count" style="font-weight:bold; color:#ffdd59;">Caricamento...</span></div>
    <div class="login-box">
        <input type="text" placeholder="Email Volontario">
        <input type="password" placeholder="Password">
        <button>Accedi</button>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inizializzazione Mappa su Italia
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
// Funzione per scegliere il colore in base alla temperatura (Bright_t31)
    function getColor(temp) {
        return temp > 320 ? '#d73027' : // Rosso (Molto caldo)
               temp > 310 ? '#f46d43' : // Arancione (Caldo)
               temp > 300 ? '#fdae61' : // Giallo-Arancio
                            '#fee08b';   // Giallo (Moderato)
    }

    async function loadNasaData() {
        const NASA_KEY = "6c7f29542d837e182b0bf7292cb52b99";
        const url = `https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/${NASA_KEY}/VIIRS_SNPP_NRT/6,35,19,48/1`;
        
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("Errore: " + res.status);
            const csv = await res.text();
            const lines = csv.split('\n').filter(l => l.trim().length > 0).slice(1);
            
            document.getElementById('fire-count').innerText = lines.length + " focolai rilevati";

            lines.forEach(line => {
                const c = line.split(',');
                if(c.length > 2) {
                    const lat = parseFloat(c[0]);
                    const lon = parseFloat(c[1]);
                    const temp = parseFloat(c[2]); // Bright_ti4 o ti5
                    const color = getColor(temp);

                    const fireIcon = L.divIcon({
                        html: `<i class="fas fa-fire" style="color: ${color}; font-size: 22px; text-shadow: 0 0 3px black;"></i>`,
                        className: 'custom-fire-icon',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });

                    L.marker([lat, lon], {icon: fireIcon})
                     .addTo(map)
                     .bindPopup(`<b>🔥 Incendio</b><br>Intensità: ${temp}K<br>Lat: ${lat}`);

                    L.circle([lat, lon], {
                        color: color, fillColor: color, fillOpacity: 0.3, radius: 2000 
                    }).addTo(map);
                }
            });
        } catch(e) { console.error(e.message); }
    }

    // --- AGGIUNGIAMO LA LEGENDA ALLA MAPPA ---
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'info legend');
        const grades = [0, 300, 310, 320];
        const labels = ['Moderato', 'Medio', 'Elevato', 'Critico'];
        const colors = ['#fee08b', '#fdae61', '#f46d43', '#d73027'];

        div.innerHTML = '<b>Intensità</b><br>';
        for (let i = 0; i < grades.length; i++) {
            div.innerHTML += '<i style="background:' + colors[i] + '"></i> ' + labels[i] + '<br>';
        }
        return div;
    };
    legend.addTo(map);

    loadNasaData();
</script>
</body>
</html>
