<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - PRO TOTAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #333; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        .login-box { display: flex; align-items: center; }
        .btn-news { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 15px; }
        .btn-login { padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        #stat { font-weight: bold; font-size: 1.1em; color: #fff; }

        .legend { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 10px; 
            border-radius: 8px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); 
            line-height: 24px; 
            color: #333; 
            font-size: 13px;
            font-weight: bold;
        }
        .legend i { width: 18px; text-align: center; margin-right: 8px; }
    </style>
</head>
<body>

<header>
    <div id="stat">🇮🇹 MONITORAGGIO ITALIA: <span id="count">Verifica Alert Operativi...</span></div>
    <div class="login-box">
        <button class="btn-news" onclick="openNewsMenu()">NOTIZIE RAPIDE</button>
        <div id="login-section">
            <input type="password" id="operator-code" placeholder="Codice" style="padding:8px; border-radius:4px; border:1px solid #444; background:#333; color:white; width:100px; margin-right: 5px;">
            <button class="btn-login" onclick="checkAuth()">ENTRA</button>
        </div>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const map = L.map('map').setView([42.0, 12.5], 6);

    // --- NUOVO LAYER MAPPA (OpenStreetMap Standard) ---
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    const nasaLayer = L.layerGroup().addTo(map);
    const cloudLayer = L.layerGroup().addTo(map);
    
    const blacklist = [
        {lat:41.13, lon:15.45}, {lat:42.04, lon:14.72}, {lat:44.78, lon:10.73}, 
        {lat:45.44, lon:10.49}, {lat:45.69, lon:11.44}, {lat:45.72, lon:11.38}, 
        {lat:45.73, lon:11.78}, {lat:45.92, lon:12.31}, {lat:46.20, lon:13.13}, 
        {lat:45.85, lon:8.97}, {lat:46.96, lon:7.16}, {lat:45.10, lon:8.82}, 
        {lat:45.45, lon:12.23}, {lat:37.20, lon:15.17}, {lat:37.13, lon:15.18}, 
        {lat:40.59, lon:18.03}, {lat:40.48, lon:17.22}, {lat:38.20, lon:15.24}, 
        {lat:39.09, lon:9.01}, {lat:43.58, lon:10.33}, {lat:44.29, lon:8.44}, 
        {lat:43.62, lon:13.36}, {lat:45.47, lon:10.22}, {lat:45.15, lon:9.97}, 
        {lat:45.64, lon:9.61}, {lat:45.72, lon:9.47}, {lat:45.79, lon:8.70}, 
        {lat:45.38, lon:11.92}, {lat:44.54, lon:10.78}, {lat:45.10, lon:7.51}, 
        {lat:40.58, lon:9.71}, {lat:39.20, lon:8.39}, {lat:37.75, lon:14.99}, 
        {lat:38.79, lon:15.21}
    ];

    function toDMS(deg, pos, neg) {
        const absolute = Math.abs(deg);
        const d = Math.floor(absolute);
        const m = Math.floor((absolute - d) * 60);
        const s = ((absolute - d - m / 60) * 3600).toFixed(1);
        const direction = deg >= 0 ? pos : neg;
        return `${d}° ${m}' ${s}" ${direction}`;
    }

    function getVegetationType(lat, lon) {
        if (lat > 44.0 || (lat < 42.5 && lat > 41.5)) return "🌲 BOSCO / FORESTA";
        if (lat < 39.0) return "🌱 MACCHIA MEDITERRANEA / ARBUSTI";
        return "🌾 AREA AGRICOLA / VEGETAZIONE MISTA";
    }

    window.openNewsMenu = () => {
        const scelta = prompt("Scegli la fonte notizie:\n1 - Vigili del Fuoco\n2 - Protezione Civile\n3 - Geoportale AIB", "1");
        if (scelta === "1") window.open('https://www.vigilfuoco.it/media/notizie/dal-territorio', '_blank');
        else if (scelta === "2") window.open('https://www.iononrischio.gov.it/it/preparati/incendi-boschivi/', '_blank');
        else if (scelta === "3") window.open('http://www.pcn.minambiente.it/viewer/index.php?services=AIB_Incendi_PNZ', '_blank');
    };

    window.checkAuth = () => {
        const code = document.getElementById('operator-code').value;
        if (code === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ OPERATIVO</b>";
        } else {
            alert("Codice errato");
        }
    };

    const legend = L.control({position: 'bottomleft'});
    legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<div><i class="fas fa-fire" style="color:#d73027"></i> Incendio Satellite</div><div><i class="fas fa-camera" style="color:purple"></i> Alert Operativo</div>`;
        return div;
    };
    legend.addTo(map);

    const intensityLegend = L.control({position: 'bottomright'});
    intensityLegend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<div style="text-align:center; border-bottom:1px solid #ccc; margin-bottom:5px;">INTENSITÀ</div><div><i class="fas fa-fire" style="color:#ffff00"></i> Moderato</div><div><i class="fas fa-fire" style="color:#ffcc00"></i> Medio</div><div><i class="fas fa-fire" style="color:#ff6666"></i> Elevato</div><div><i class="fas fa-fire" style="color:#800000"></i> Critico</div>`;
        return div;
    };
    intensityLegend.addTo(map);

    function getIntensityColor(temp) {
        if (temp > 350) return '#800000'; 
        if (temp > 330) return '#ff6666'; 
        if (temp > 310) return '#ffcc00'; 
        return '#ffff00'; 
    }

    async function loadNasaData() {
        try {
            const res = await fetch(`https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1`);
            const csv = await res.text();
            const lines = csv.split('\n');
            let nReal = 0;
            nasaLayer.clearLayers();

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(',');
                if (c.length < 3) continue;
                const lat = parseFloat(c[0]);
                const lon = parseFloat(c[1]);
                const temp = parseFloat(c[2]);

                let inArea = false;
                if (lat > 44.2 && lat < 47.1 && lon > 6.6 && lon < 13.5) inArea = true; 
                else if (lat > 37.5 && lat <= 44.2 && lon > 8.0 && lon < 17.5) inArea = true; 
                else if (lat > 36.5 && lat <= 37.5 && lon > 12.1 && lon < 15.6) inArea = true; 
                else if (lat > 38.8 && lat < 41.5 && lon > 8.0 && lon < 10.0) inArea = true;

                if (inArea) {
                    let skip = false;
                    blacklist.forEach(s => { if(Math.sqrt(Math.pow(lat-s.lat,2)+Math.pow(lon-s.lon,2)) < 0.06) skip=true; });
                    if(skip) continue;

                    nReal++;
                    const color = getIntensityColor(temp);
                    const veg = getVegetationType(lat, lon);
                    const info = `<div style="font-size:12px;"><b>ANALISI AMBIENTALE:</b><br>${veg}<br><br><b>COORD DMS:</b><br>${toDMS(lat, 'N', 'S')}<br>${toDMS(lon, 'E', 'W')}</div>`;

                    L.circle([lat, lon], { color: color, fillColor: color, fillOpacity: 0.4, radius: 700 }).addTo(nasaLayer).bindPopup(info);
                    L.marker([lat, lon], { icon: L.divIcon({ html: `<i class="fas fa-fire" style="color:${color}; font-size:16px; text-shadow: 0 0 3px #000;"></i>`, className: 'f-icon' }) }).addTo(nasaLayer).bindPopup(info);
                }
            }
            document.getElementById('count').innerText = `${nReal} Alert Operativi`;
        } catch (e) { console.error("Errore NASA"); }
    }

    window.onload = () => {
        loadNasaData();
        onSnapshot(query(collection(db, "segnalazioni"), orderBy("timestamp", "desc")), (snap) => {
            cloudLayer.clearLayers();
            snap.forEach(doc => {
                const d = doc.data();
                const dmsSegnalazione = `<b>COORD SEGNALAZIONE:</b><br>${toDMS(d.lat, 'N', 'S')}<br>${toDMS(d.lon, 'E', 'W')}`;
                L.marker([d.lat, d.lon], { icon: L.divIcon({ html: `<i class="fas fa-camera" style="color:purple; font-size:18px;"></i>`, className: 'c-icon' }) }).addTo(cloudLayer).bindPopup(dmsSegnalazione);
            });
        });
        setInterval(loadNasaData, 600000); 
    };
</script>
</body>
</html>
