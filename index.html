<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - V3 FINAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #333; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        .login-box { display: flex; align-items: center; }
        .btn-news { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 15px; }
        .btn-login { padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        #stat { font-weight: bold; font-size: 1.1em; color: #fff; line-height: 1.2; }
        .sub-stat { font-size: 0.7em; color: #ffa500; display: block; }

        .legend { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 10px; border-radius: 8px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); 
            line-height: 24px; color: #333; font-size: 13px; font-weight: bold;
        }

        .ruler-btn {
            background: white; width: 34px; height: 34px; line-height: 34px;
            text-align: center; cursor: pointer; box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            border-radius: 4px; color: #333; font-size: 16px;
        }
        .ruler-btn.active { background: #e74c3c; color: white; }
        .distance-label { background: rgba(0,0,0,0.8); color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; z-index: 1000; }
        
        /* Stile freccia vento */
        .wind-icon-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Widget Meteo Popup */
        .weather-widget { border-top: 1px solid #ddd; margin-top: 8px; padding-top: 8px; }
        .weather-item { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    </style>
</head>
<body>

<header>
    <div id="stat">
        🇮🇹 MONITORAGGIO ITALIA: <span id="count">...</span>
        <span class="sub-stat" id="area-est">Caricamento dati...</span>
    </div>
    <div class="login-box">
        <button class="btn-news" onclick="openNewsMenu()">NOTIZIE RAPIDE</button>
        <div id="login-section">
            <input type="password" id="operator-code" placeholder="Codice" style="padding:8px; border-radius:4px; border:1px solid #444; background:#333; color:white; width:100px; margin-right: 5px;">
            <button class="btn-login" onclick="checkAuth()">ENTRA</button>
        </div>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
    const topografica = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });

    const map = L.map('map', { center: [42.0, 12.5], zoom: 6, layers: [satellite] });

    const nasaLayer = L.layerGroup().addTo(map);
    const cloudLayer = L.layerGroup().addTo(map);
    const windLayer = L.layerGroup().addTo(map);

    L.control.layers({ "🛰️ Satellitare": satellite, "⛰️ Topografica": topografica }, 
                     { "🔥 Incendi NASA": nasaLayer, "📸 Alert Cloud": cloudLayer, "🌬️ Direzione Vento": windLayer }, 
                     { collapsed: false }).addTo(map);

    // --- RIGHELLO ---
    let rulerActive = false;
    let rulerPoints = [];
    let rulerLayers = L.layerGroup().addTo(map);
    const RulerControl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function() {
            const btn = L.DomUtil.create('div', 'leaflet-bar leaflet-control ruler-btn');
            btn.innerHTML = '<i class="fas fa-ruler-combined"></i>';
            L.DomEvent.on(btn, 'click', (e) => {
                L.DomEvent.stopPropagation(e);
                rulerActive = !rulerActive;
                btn.classList.toggle('active');
                map.getContainer().style.cursor = rulerActive ? 'crosshair' : '';
                if(!rulerActive) { rulerLayers.clearLayers(); rulerPoints = []; }
            });
            return btn;
        }
    });
    map.addControl(new RulerControl());

    map.on('click', (e) => {
        if (!rulerActive) return;
        rulerPoints.push(e.latlng);
        L.circleMarker(e.latlng, { radius: 4, color: 'red' }).addTo(rulerLayers);
        if (rulerPoints.length === 2) {
            const d = map.distance(rulerPoints[0], rulerPoints[1]);
            const txt = d > 1000 ? (d/1000).toFixed(2) + " km" : Math.round(d) + " m";
            L.polyline(rulerPoints, { color: 'red', weight: 2, dashArray: '5,5' }).addTo(rulerLayers);
            L.marker(e.latlng, { icon: L.divIcon({ className: 'distance-label', html: txt, iconAnchor: [-10, 20] }) }).addTo(rulerLayers);
            rulerPoints = [e.latlng];
        }
    });

    // --- FILTRI ---
    function isOutsideItaly(lat, lon) {
        if (lat < 35.4 || lat > 47.1 || lon < 6.6 || lon > 18.6) return true;
        if (lat < 37.4 && lon < 12.0) return true; 
        if (lat < 46.0 && lon > 13.7) {
            if (lat < 42.0 && lon > 15.1) return true;
            if (lat >= 42.0 && lon > 13.7) return true;
        }
        if (lat > 43.5 && lon < 7.0) return true;
        return false;
    }

    const blacklist = [
        {lat:41.13, lon:15.45}, {lat:42.04, lon:14.72}, {lat:44.78, lon:10.73}, 
        {lat:37.20, lon:15.17}, {lat:45.47, lon:10.22}, {lat:40.48, lon:17.22}
    ];

    function toDMS(deg, pos, neg) {
        const abs = Math.abs(deg);
        const d = Math.floor(abs), m = Math.floor((abs - d) * 60), s = ((abs - d - m / 60) * 3600).toFixed(1);
        return `${d}°${m}'${s}"${deg >= 0 ? pos : neg}`;
    }

    // --- CARICAMENTO DATI ---
    async function loadNasaData() {
        try {
            const res = await fetch(`https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1`);
            const csv = await res.text();
            const lines = csv.split('\n');
            let nReal = 0;
            let totalHa = 0;

            nasaLayer.clearLayers();
            windLayer.clearLayers();

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(',');
                if (c.length < 3) continue;
                const lat = parseFloat(c[0]), lon = parseFloat(c[1]);

                if (isOutsideItaly(lat, lon)) continue;

                let skip = false;
                blacklist.forEach(s => { if(Math.sqrt(Math.pow(lat-s.lat,2)+Math.pow(lon-s.lon,2)) < 0.08) skip=true; });
                if(skip) continue;

                nReal++;
                totalHa += 14.06;
                
                // --- LOGICA POPUP CON METEO LOCALE ---
                const popupId = `popup-${i}`;
                const popupContent = L.DomUtil.create('div', '');
                popupContent.innerHTML = `
                    <div style="font-size:11px;">
                        <b>SITO:</b> Incendio Attivo<br>
                        <b>AREA:</b> ~14 ha<br>
                        <b>COORDS:</b> ${toDMS(lat,'N','S')} ${toDMS(lon,'E','W')}
                        <div id="${popupId}" class="weather-widget">
                            <i class="fas fa-spinner fa-spin"></i> Caricamento meteo...
                        </div>
                    </div>`;

                L.circle([lat, lon], { color: 'red', weight: 1, fillColor: '#f03', fillOpacity: 0.3, radius: 375 }).addTo(nasaLayer);
                
                const marker = L.marker([lat, lon], { 
                    icon: L.divIcon({ 
                        html: `<i class="fas fa-fire" style="color:#ff4500; font-size:20px; text-shadow: 0 0 5px #000;"></i>`, 
                        className: 'fire-icon', iconSize: [20, 20], iconAnchor: [10, 10]
                    }) 
                }).addTo(nasaLayer).bindPopup(popupContent);

                // Carica meteo solo all'apertura del popup per risparmiare risorse
                marker.on('popupopen', () => {
                    fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=b1b15e88fa7972254124651173e936f6&units=metric&lang=it`)
                    .then(r => r.json())
                    .then(w => {
                        const widget = document.getElementById(popupId);
                        if(widget && w.main) {
                            widget.innerHTML = `
                                <div class="weather-item"><i class="fas fa-thermometer-half" style="color:#e74c3c"></i> <b>Temp:</b> ${w.main.temp.toFixed(1)}°C</div>
                                <div class="weather-item"><i class="fas fa-tint" style="color:#3498db"></i> <b>Umidità:</b> ${w.main.humidity}%</div>
                                <div class="weather-item"><i class="fas fa-cloud" style="color:#95a5a6"></i> <b>Stato:</b> ${w.weather[0].description}</div>
                            `;
                        }
                    }).catch(() => {
                        document.getElementById(popupId).innerHTML = "Meteo non disponibile";
                    });
                });

                // Recupero Vento per Layer separato
                fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=b1b15e88fa7972254124651173e936f6&units=metric`)
                .then(r => r.json())
                .then(w => {
                    if(w.wind) {
                        const speed = (w.wind.speed * 3.6).toFixed(0);
                        L.marker([lat, lon], {
                            icon: L.divIcon({
                                className: 'wind-icon-container',
                                html: `<div style="transform: rotate(${w.wind.deg}deg); color: #00f2ff; font-size: 24px; filter: drop-shadow(0 0 2px black);">
                                          <i class="fas fa-location-arrow"></i>
                                       </div>
                                       <div style="color:white; font-size:10px; font-weight:bold; text-shadow: 1px 1px 2px black;">${speed} km/h</div>`,
                                iconSize: [40, 40],
                                iconAnchor: [20, 20]
                            }),
                            interactive: false
                        }).addTo(windLayer);
                    }
                }).catch(err => console.log("Errore Vento"));
            }
            document.getElementById('count').innerText = `${nReal} Alert Operativi`;
            document.getElementById('area-est').innerText = `Superficie colpita stimata: ${totalHa.toLocaleString('it-IT')} Ettari (ha)`;
        } catch (e) { console.error("Errore NASA"); }
    }

    window.openNewsMenu = () => {
        const s = prompt("1-VVF | 2-Prot. Civile | 3-AIB", "1");
        if (s === "1") window.open('https://www.vigilfuoco.it/media/notizie/dal-territorio', '_blank');
        if (s === "2") window.open('https://www.iononrischio.gov.it/it/preparati/incendi-boschivi/', '_blank');
        if (s === "3") window.open('http://www.pcn.minambiente.it/viewer/index.php?services=AIB_Incendi_PNZ', '_blank');
    };

    window.checkAuth = () => {
        if (document.getElementById('operator-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ OPERATIVO</b>";
        } else alert("Codice errato");
    };

    window.onload = () => {
        loadNasaData();
        onSnapshot(query(collection(db, "segnalazioni"), orderBy("timestamp", "desc")), (snap) => {
            cloudLayer.clearLayers();
            snap.forEach(doc => {
                const d = doc.data();
                L.marker([d.lat, d.lon], { icon: L.divIcon({ html: `<i class="fas fa-camera" style="color:purple; font-size:18px;"></i>` }) }).addTo(cloudLayer);
            });
        });
        setInterval(loadNasaData, 600000); 
    };
</script>
</body>
</html>
