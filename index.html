<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - PRO TOTAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #333; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        .login-box { display: flex; align-items: center; }
        .btn-news { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 15px; }
        .btn-login { padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        #stat { font-weight: bold; font-size: 1.1em; color: #fff; }
    </style>
</head>
<body>

<header>
    <div id="stat">🇮🇹 MONITORAGGIO ITALIA: <span id="count">Verifica Blacklist 100%...</span></div>
    <div class="login-box">
        <button class="btn-news" onclick="window.open('https://www.vigilfuoco.tv/notizie')">NOTIZIE RAPIDE</button>
        <div id="login-section">
            <input type="password" id="operator-code" placeholder="Codice" style="padding:8px; border-radius:4px; border:1px solid #444; background:#333; color:white; width:100px; margin-right: 5px;">
            <button class="btn-login" onclick="checkAuth()">ENTRA</button>
        </div>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const nasaLayer = L.layerGroup().addTo(map);
    const cloudLayer = L.layerGroup().addTo(map);
    
    // --- BLACKLIST INTEGRALE 100% (STORICA + RECENTE) ---
    const blacklist = [
        // CATEGORIA 1: RICHIESTE SPECIFICHE DI OGGI
        {lat:41.13, lon:15.45}, // Prysmian (Sette Torri)
        {lat:42.04, lon:14.72}, // Z.I. San Salvo (Piane Sant'Angelo)
        {lat:44.78, lon:10.73}, // Panaria Ceramiche (Canaletto)
        {lat:45.44, lon:10.49}, // Feralpi Siderurgica (Lonato)
        {lat:45.69, lon:11.44}, // Rossifloor (Marano Vicentino)
        {lat:45.72, lon:11.38}, // Z.I. Schio (Zanè)
        {lat:45.73, lon:11.78}, // Aggregato Cassola
        {lat:45.92, lon:12.31}, // Z.I. Vittorio Veneto
        {lat:46.20, lon:13.13}, // Ferriere Nord (Rivoli)
        {lat:45.85, lon:8.97},  // Z.I. Stabio (Svizzera)
        {lat:46.96, lon:7.16},  // Galmiz (Svizzera)

        // CATEGORIA 2: RAFFINERIE E POLI PETROLCHIMICI (PUNTI STORICI)
        {lat:45.10, lon:8.82},  // Sannazzaro (Raffineria ENI)
        {lat:45.45, lon:12.23}, // Porto Marghera
        {lat:37.20, lon:15.17}, // Priolo Gargallo
        {lat:37.13, lon:15.18}, // Augusta
        {lat:40.59, lon:18.03}, // Brindisi Petrolchimico
        {lat:40.48, lon:17.22}, // Taranto (ILVA/Raffineria)
        {lat:38.20, lon:15.24}, // Milazzo Raffineria
        {lat:39.09, lon:9.01},  // Sarroch (Saras)
        {lat:43.58, lon:10.33}, // Livorno (Raffineria ENI)
        {lat:44.29, lon:8.44},  // Vado Ligure
        {lat:43.62, lon:13.36}, // Falconara Marittima (Raffineria API)

        // CATEGORIA 3: ZONE INDUSTRIALI NORD E CENTRO
        {lat:45.47, lon:10.22}, // Brescia Est
        {lat:45.15, lon:9.97},  // Cremona
        {lat:45.64, lon:9.61},  // Dalmine
        {lat:45.72, lon:9.47},  // Lecco
        {lat:45.79, lon:8.70},  // Vergiate
        {lat:45.38, lon:11.92}, // Padova Z.I.
        {lat:44.54, lon:10.78}, // Sassuolo (Area Ceramiche)
        {lat:45.10, lon:7.51},  // Torino Est / Settimo Torinese

        // CATEGORIA 4: SARDEGNA E ISOLE
        {lat:40.58, lon:9.71},  // Sardegna Est (Area industriale/termica)
        {lat:39.20, lon:8.39},  // Portoscuso / Sulcis
        {lat:37.75, lon:14.99}, // Etna (Attività vulcanica)
        {lat:38.79, lon:15.21}  // Stromboli
    ];

    async function loadNasaData() {
        try {
            const res = await fetch(`https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1`);
            const csv = await res.text();
            const lines = csv.split('\n');
            let nReal = 0;
            nasaLayer.clearLayers();

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(',');
                if (c.length < 3) continue;
                const lat = parseFloat(c[0]);
                const lon = parseFloat(c[1]);

                let inArea = false;
                // --- FILTRI CONFINI NAZIONALI ---
                if (lat > 44.2 && lat < 47.1 && lon > 6.6 && lon < 13.5) inArea = true; // Nord
                else if (lat > 37.5 && lat <= 44.2 && lon > 8.0 && lon < 17.5) inArea = true; // Centro-Sud (No Balcani)
                else if (lat > 36.5 && lat <= 37.5 && lon > 12.1 && lon < 15.6) inArea = true; // Sicilia (No Tunisia)
                else if (lat > 38.8 && lat < 41.5 && lon > 8.0 && lon < 10.0) inArea = true; // Sardegna

                if (inArea) {
                    let skip = false;
                    blacklist.forEach(s => { 
                        // Raggio di tolleranza leggermente aumentato (0.06) per coprire intere fabbriche
                        if(Math.sqrt(Math.pow(lat-s.lat,2)+Math.pow(lon-s.lon,2)) < 0.06) skip=true; 
                    });
                    if(skip) continue;

                    nReal++;
                    L.marker([lat, lon], { 
                        icon: L.divIcon({ html: `<i class="fas fa-fire" style="color:#d73027; font-size:16px;"></i>`, className: 'f-icon' }) 
                    }).addTo(nasaLayer);
                }
            }
            document.getElementById('count').innerText = `${nReal} Incendi (Verificati)`;
        } catch (e) { console.error("Errore"); }
    }

    window.checkAuth = () => {
        if (document.getElementById('operator-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ OPERATIVO</b>";
        }
    };

    window.onload = () => {
        loadNasaData();
        onSnapshot(query(collection(db, "segnalazioni"), orderBy("timestamp", "desc")), (snap) => {
            cloudLayer.clearLayers();
            snap.forEach(doc => {
                const d = doc.data();
                L.marker([d.lat, d.lon], { icon: L.divIcon({ html: `<i class="fas fa-camera" style="color:purple; font-size:18px;"></i>`, className: 'c-icon' }) }).addTo(cloudLayer);
            });
        });
        setInterval(loadNasaData, 600000); 
    };
</script>
</body>
</html>
