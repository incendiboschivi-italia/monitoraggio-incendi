<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* UI & Layout */
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; overflow: hidden; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #333; z-index: 1001; position: relative; }
        #map { height: calc(100vh - 60px); width: 100%; background: #000; }
        
        /* Stats & Header */
        .stats { font-weight: bold; }
        .area-info { font-size: 0.8em; color: #ffa500; display: block; }
        
        /* Legenda originale */
        .legend { background: rgba(255,255,255,0.9); padding: 10px; border-radius: 5px; font-size: 12px; line-height: 18px; color: #333; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; border-radius: 2px; }
        
        /* Markers & Animation */
        .fire-marker { display: flex; align-items: center; justify-content: center; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(0.8); opacity: 0.8; } }
        .pulse { width: 30px; height: 30px; border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        
        /* Panels */
        #auth-panel, #report-panel { position: fixed; top: 70px; left: 20px; background: #2c3e50; color: white; padding: 20px; border-radius: 8px; z-index: 2000; display: none; width: 300px; }
        input, select { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 4px; border: none; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; }
        .btn-refresh { background: #2ecc71; }
        .btn-report { background: #e67e22; }
    </style>
</head>
<body>

<header>
    <div class="stats">
        🇮🇹 MONITORAGGIO ITALIA: <span id="count">0</span> Alert Operativi
        <span class="area-info" id="area">Superficie Italia: 0.00 ha</span>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn btn-report" onclick="checkAuthAndReport()">SEGNALA</button>
        <button class="btn btn-refresh" onclick="loadFires()">REFRESH</button>
        <button id="login-btn" class="btn" style="background:#e74c3c" onclick="toggleAuth()">ACCEDI</button>
    </div>
</header>

<div id="auth-panel">
    <h3>ACCESSO STAFF / UTENTE</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn" style="width:100%; background:#e74c3c" onclick="doLogin()">ENTRA</button>
</div>

<div id="report-panel">
    <h3>NUOVA SEGNALAZIONE</h3>
    <input type="text" id="coords" placeholder="Lat, Lon (clicca sulla mappa)" readonly>
    <select id="type">
        <option value="Boschivo">Boschivo</option>
        <option value="Interfaccia">Interfaccia</option>
        <option value="Sterpaglie">Sterpaglie</option>
    </select>
    <input type="file" id="photo" accept="image/*">
    <button class="btn" style="width:100%; background:#2ecc71" onclick="submitReport()">INVIA SEGNALAZIONE</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    const fireGroup = L.layerGroup().addTo(map);
    let currentUser = null;

    // Blacklist rafforzata
    const blacklist = [[37.13, 15.21], [44.91, 8.89], [40.63, 14.92], [42.09, 11.82], [45.45, 12.23], [37.15, 14.23], [40.48, 17.22]];

    function isWithinItaly(lat, lon) {
        // BLOCCO NORD AFRICA (Algeria/Tunisia)
        if (lat < 36.6) return false;

        // BLOCCO OVEST (Francia)
        if (lon < 6.5) return false;

        // BLOCCO CORSICA (Solo la Corsica, non la Sardegna)
        if (lat > 41.3 && lat < 43.1 && lon > 8.4 && lon < 9.6) return false;

        // BLOCCO EST (Balcani/Slovenia)
        if (lon > 18.6) return false;
        if (lat > 45.4 && lon > 13.6) return false;

        // BLOCCO NORD (Svizzera/Austria)
        if (lat > 47.1) return false;
        if (lat > 45.9 && lon > 7.1 && lon < 10.5 && lat > 46.4) return false;

        // Controllo Blacklist
        return !blacklist.some(b => Math.abs(b[0] - lat) < 0.05 && Math.abs(b[1] - lon) < 0.05);
    }

    async function loadFires() {
        fireGroup.clearLayers();
        try {
            const resp = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1"));
            const data = await resp.text();
            const lines = data.split('\n').slice(1);
            let count = 0;

            lines.forEach(line => {
                const [lat, lon, brt] = line.split(',');
                const l = parseFloat(lat), n = parseFloat(lon);
                
                if (isWithinItaly(l, n)) {
                    count++;
                    const temp = (parseFloat(brt) - 273.15).toFixed(1);
                    // Colori Legenda
                    const color = temp > 67 ? "#e74c3c" : (temp > 52 ? "#e67e22" : "#f1c40f");
                    
                    L.marker([l, n], {
                        icon: L.divIcon({
                            className: 'fire-marker',
                            html: `<div class="pulse" style="border:2px solid ${color}"></div><i class="fas fa-fire" style="color:${color}"></i>`
                        })
                    }).addTo(fireGroup).bindPopup(`Temp: ${temp}°C`);
                }
            });

            document.getElementById('count').innerText = count;
            document.getElementById('area').innerText = `Superficie Italia: ${(count * 14.06).toFixed(2)} ha`;
        } catch (e) { console.error("Errore caricamento NASA"); }
    }

    // Gestione UI e Segnalazioni
    function toggleAuth() { document.getElementById('auth-panel').style.display = 'block'; }
    function doLogin() { 
        currentUser = document.getElementById('email').value;
        document.getElementById('login-btn').innerText = "ID: " + currentUser.split('@')[0].toUpperCase();
        document.getElementById('auth-panel').style.display = 'none';
    }

    function checkAuthAndReport() {
        if (!currentUser) alert("Effettua l'accesso per segnalare.");
        else document.getElementById('report-panel').style.display = 'block';
    }

    map.on('click', (e) => {
        if (document.getElementById('report-panel').style.display === 'block') {
            document.getElementById('coords').value = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
        }
    });

    function submitReport() {
        const [lat, lon] = document.getElementById('coords').value.split(',').map(Number);
        // Marker Viola per Segnalazione Manuale
        L.marker([lat, lon], {
            icon: L.divIcon({
                className: 'fire-marker',
                html: `<div class="pulse" style="border:2px solid #9b59b6"></div><i class="fas fa-user-shield" style="color:#9b59b6"></i>`
            })
        }).addTo(map).bindPopup("Segnalazione Manuale");
        document.getElementById('report-panel').style.display = 'none';
        alert("Segnalazione inviata con successo!");
    }

    // Legenda
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<b>LEGENDA</b><br>
            <i style="background:#e74c3c"></i> Critico (> 67°C)<br>
            <i style="background:#e67e22"></i> Elevato (52-67°C)<br>
            <i style="background:#f1c40f"></i> Moderato (< 52°C)<br>
            <i style="background:#9b59b6"></i> Segnalazione`;
        return div;
    };
    legend.addTo(map);

    loadFires();
</script>
</body>
</html>
