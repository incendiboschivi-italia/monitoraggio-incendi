<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoraggio Incendi Italia - Real Time</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; }
        header {
            height: 60px; background: #2c3e50; color: white;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .login-box input { padding: 5px; border-radius: 4px; border: none; margin-right: 5px; }
        .login-box button { padding: 5px 15px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 4px; }
        .info.legend {
    padding: 10px;
    background: white;
    background: rgba(255,255,255,0.9);
    line-height: 18px;
    color: #333;
    border-radius: 5px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
.info.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.7;
}
    </style>
</head>
<body>

<header>
    <div>🔥 INCENDI ITALIA LIVE: <span id="fire-count" style="font-weight:bold; color:#ffdd59;">Caricamento...</span></div>
    <div class="login-box">
        <input type="text" placeholder="Email Volontario">
        <input type="password" placeholder="Password">
        <button>Accedi</button>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inizializzazione Mappa su Italia
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    async function loadNasaData() {
        const NASA_KEY = "6c7f29542d837e182b0bf7292cb52b99";
        const url = `https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/${NASA_KEY}/VIIRS_SNPP_NRT/6,35,19,48/1`;
        
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("Errore: " + res.status);
            const csv = await res.text();
            const lines = csv.split('\n').slice(1);
            
            // --- NOVITÀ: Conta e mostra il totale ---
            const totalFires = lines.filter(line => line.trim().length > 0).length;
            document.getElementById('fire-count').innerText = totalFires + " focolai rilevati";
            // ---------------------------------------

            lines.forEach(line => {
                const c = line.split(',');
                if(c.length > 2) {
                    const lat = parseFloat(c[0]);
                    const lon = parseFloat(c[1]);

                    // Crea l'icona della fiamma
                    const fireIcon = L.divIcon({
                        html: '<i class="fas fa-fire" style="color: #ff4500; font-size: 22px; text-shadow: 0 0 3px black;"></i>',
                        className: 'custom-fire-icon',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });

                    // Aggiungi il marker (fiammella)
                    L.marker([lat, lon], {icon: fireIcon})
                     .addTo(map)
                     .bindPopup(`<b>🔥 Incendio Satellite</b><br>Lat: ${lat}<br>Lon: ${lon}`);

                    // Aggiungi il cerchio di calore (Punto 2)
                    L.circle([lat, lon], {
                        color: 'red',
                        fillColor: '#f03',
                        fillOpacity: 0.2,
                        radius: 1500 
                    }).addTo(map);
                }
            });
            console.log("Mappa aggiornata con icone fuoco!");
        } catch(e) { console.error("Errore NASA:", e.message); }
    }

    // Avvia il caricamento
    loadNasaData();
</script>
</body>
</html>
