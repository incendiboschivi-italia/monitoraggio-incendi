<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoraggio Incendi Italia - Sistema Operativo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: calc(100vh - 60px); width: 100%; }
        header {
            height: 60px; background: #2c3e50; color: white;
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .login-box input { padding: 6px; border-radius: 4px; border: none; }
        .login-box button { padding: 6px 15px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #admin-panel { height: 40px; background: #ecf0f1; display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 2px solid #bdc3c7; }
        .hidden { display: none; }
        .info.legend { padding: 10px; background: rgba(255,255,255,0.9); line-height: 18px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .info.legend i { width: 16px; height: 16px; float: left; margin-right: 8px; opacity: 0.8; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div>🔥 INCENDI LIVE: <span id="fire-count" style="color:#ffdd59; font-weight:bold;">...</span></div>
    <div id="login-section" class="login-box">
        <input type="password" id="operator-code" placeholder="Codice Operatore">
        <button onclick="checkAuth()">ENTRA</button>
    </div>
    <div id="user-logged" class="hidden" style="color:#2ecc71; font-weight:bold;">
        <i class="fas fa-user-shield"></i> OPERATORE ATTIVO
    </div>
</header>

<div id="admin-panel" class="hidden">
    <button onclick="location.reload()" style="font-size:12px;">Aggiorna Dati</button>
    <button onclick="resetRimossi()" style="font-size:12px; background:#bdc3c7;">Ripristina Segnalazioni Eliminate</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let isLogged = false;
    let puntiRimossi = JSON.parse(localStorage.getItem('puntiRimossi')) || [];
    let markersLayer = L.layerGroup().addTo(map);

    function checkAuth() {
        if (document.getElementById('operator-code').value === "GABRIELE2024") {
            isLogged = true;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('user-logged').classList.remove('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            loadNasaData();
            alert("Accesso Autorizzato.");
        } else { alert("Codice Errato."); }
    }

    function getColor(temp) {
        return temp > 325 ? '#d73027' : temp > 315 ? '#f46d43' : temp > 305 ? '#fdae61' : '#fee08b';
    }

    async function loadNasaData() {
        const NASA_KEY = "6c7f29542d837e182b0bf7292cb52b99";
        const url = `https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/${NASA_KEY}/VIIRS_SNPP_NRT/6,35,19,48/1`;
        
        try {
            const res = await fetch(url);
            const csv = await res.text();
            const lines = csv.split('\n').filter(l => l.trim().length > 0).slice(1);
            
            markersLayer.clearLayers();
            let count = 0;

            lines.forEach(line => {
                const c = line.split(',');
                if(c.length > 2) {
                    const lat = parseFloat(c[0]), lon = parseFloat(c[1]), bright = parseFloat(c[2]);
                    const idPunto = `${lat}_${lon}`;

                    let isItaly = false;
                    
                    // --- FILTRO GEOGRAFICO ULTRA-PRECISO ---
                    // 1. Nord-Est (Taglio Istria/Slovenia a 13.5°)
                    if (lat >= 44.8 && lat <= 47.1) {
                        if (lon >= 6.6 && lon <= 13.5) isItaly = true;
                    }
                    // 2. Nord-Ovest e Centro
                    else if (lat >= 44.0 && lat < 44.8) {
                        if (lon >= 6.6 && lon <= 13.8) isItaly = true;
                    }
                    // 3. Centro e Mare (Rimuove Corsica con blocco specifico)
                    else if (lat >= 39.5 && lat < 44.0) {
                        isItaly = (lon >= 7.2 && lon <= 15.5);
                        if (lon < 9.6 && lat > 41.3 && lat < 43.1) isItaly = false;
                    }
                    // 4. Sud e Sicilia
                    else if (lat >= 36.5 && lat < 39.5) {
                        if (lon >= 12.0 && lon <= 18.8) isItaly = true;
                    }
                    // 5. Sardegna
                    if (lat >= 38.8 && lat <= 41.3 && lon >= 8.0 && lon <= 10.0) {
                        isItaly = true;
                    }

                    if (isItaly && !puntiRimossi.includes(idPunto)) {
                        count++;
                        const col = getColor(bright);
                        const fireIcon = L.divIcon({
                            html: `<i class="fas fa-fire" style="color: ${col}; font-size: 22px; text-shadow: 0 0 3px black;"></i>`,
                            className: 'custom-fire-icon', iconSize: [20, 20], iconAnchor: [10, 10]
                        });

                        let popupContent = `<b>🔥 Segnalazione</b><br>Intensità: ${bright}K`;
                        if (isLogged) {
                            popupContent += `<br><button class="btn-delete" onclick="rimuoviPunto('${idPunto}')">Elimina Segnalazione</button>`;
                        }

                        L.marker([lat, lon], {icon: fireIcon}).addTo(markersLayer).bindPopup(popupContent);
                        L.circle([lat, lon], { color: col, fillColor: col, fillOpacity: 0.2, radius: 1500 }).addTo(markersLayer);
                    }
                }
            });
            document.getElementById('fire-count').innerText = count + " focolai in Italia";
        } catch(e) { console.error("Errore caricamento dati:", e); }
    }

    function rimuoviPunto(id) {
        puntiRimossi.push(id);
        localStorage.setItem('puntiRimossi', JSON.stringify(puntiRimossi));
        loadNasaData();
    }

    function resetRimossi() {
        puntiRimossi = [];
        localStorage.removeItem('puntiRimossi');
        loadNasaData();
        alert("Tutti i punti sono stati ripristinati.");
    }

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'info legend');
        const colors = ['#d73027', '#f46d43', '#fdae61', '#fee08b'];
        const labels = ['Critico', 'Elevato', 'Medio', 'Basso'];
        div.innerHTML = '<b>Intensità Fuoco</b><br>';
        for (let i = 0; i < colors.length; i++) {
            div.innerHTML += `<i style="background:${colors[i]}"></i> ${labels[i]}<br>`;
        }
        return div;
    };
    legend.addTo(map);
    loadNasaData();
</script>
</body>
</html>
