<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA MONITORAGGIO INCENDI - RECOVERY</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background: #0b0e11; color: white; font-family: sans-serif; }
        header { height: 60px; background: #1a1d21; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #e74c3c; justify-content: space-between; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .stats { line-height: 1.1; }
        .btn { border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-left: 5px; }
        .btn-refresh { background: #2ecc71; }
        /* Animazione Pulse Corretta */
        .fire-icon { position: relative; }
        .pulse { 
            position: absolute; width: 20px; height: 20px; 
            border-radius: 50%; background: rgba(231, 76, 60, 0.5);
            animation: pulse-out 1.5s infinite; transform: translate(-25%, -25%);
        }
        @keyframes pulse-out { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div class="stats">
        <b style="font-size:1.2em">IT ALERT NASA: <span id="count">...</span></b><br>
        <small id="area" style="color:#ffa500">Area stimata: 0 ha</small>
    </div>
    <div>
        <button class="btn btn-refresh" onclick="fetchNASA()">AGGIORNA DATI</button>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    const fireLayer = L.layerGroup().addTo(map);

    // Filtro Geografico Semplice (Solo rettangolo Italia per evitare crash)
    function isItaly(lat, lon) {
        return (lat > 35.0 && lat < 47.5 && lon > 6.0 && lon < 19.0);
    }

    async function fetchNASA() {
        document.getElementById('count').innerText = "CARICAMENTO...";
        const url = "https://corsproxy.io/?" + encodeURIComponent("https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1");
        
        try {
            const response = await fetch(url);
            const data = await response.text();
            const lines = data.split('\n').slice(1);
            
            fireLayer.clearLayers();
            let total = 0;

            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length < 3) return;

                const lat = parseFloat(parts[0]);
                const lon = parseFloat(parts[1]);
                const temp = Math.round(parseFloat(parts[2]) - 273.15);

                if (isItaly(lat, lon)) {
                    total++;
                    const color = temp > 60 ? "#ff0000" : "#ffa500";
                    
                    L.marker([lat, lon], {
                        icon: L.divIcon({
                            className: 'fire-icon',
                            html: `<div class="pulse" style="background:${color}"></div><i class="fas fa-fire" style="color:${color}; font-size:16px;"></i>`
                        })
                    }).addTo(fireLayer).bindPopup(`Rilevamento NASA: ${temp}°C`);
                }
            });

            document.getElementById('count').innerText = total;
            document.getElementById('area').innerText = `Area stimata: ${total * 14} ha`;

        } catch (error) {
            document.getElementById('count').innerText = "ERRORE CONNESSIONE";
        }
    }

    fetchNASA();
    setInterval(fetchNASA, 300000); // Aggiorna ogni 5 minuti
</script>
</body>
</html>
