<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #333; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        #stat { font-weight: bold; color: #fff; }
        .sub-stat { font-size: 0.75em; color: #ffa500; display: block; }

        /* Radar Animato */
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 0.2; }
            100% { transform: scale(0.8); opacity: 0.8; }
        }
        .fire-pulse {
            width: 34px; height: 34px; border-radius: 50%;
            position: absolute; margin-left: -7px; margin-top: -7px;
            animation: pulse 1.5s infinite; pointer-events: none;
        }

        /* Legenda a Destra */
        .info.legend {
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3); line-height: 18px; font-size: 11px;
            max-width: 200px; color: #333;
        }
        .legend b { display: block; margin-bottom: 5px; border-bottom: 1px solid #ddd; font-size: 12px; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 3px; }

        .btn-news { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-login { padding: 8px 15px; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div id="stat">
        🇮🇹 MONITORAGGIO ITALIA: <span id="count">Caricamento...</span>
        <span class="sub-stat" id="area-est">Analisi superficie in corso...</span>
    </div>
    <div style="display: flex; align-items: center;">
        <button class="btn-news" onclick="alert('Servizio Notizie in Aggiornamento')">NOTIZIE RAPIDE</button>
        <div id="login-section">
            <input type="password" id="operator-code" placeholder="Codice" style="padding:8px; border-radius:4px; border:1px solid #444; background:#333; color:white; width:80px;">
            <button class="btn-login" onclick="checkAuth()">ENTRA</button>
        </div>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });
    
    const map = L.map('map', { center: [42.0, 12.5], zoom: 6, layers: [satellite] });
    const firesLayer = L.layerGroup().addTo(map);

    L.control.layers({"🛰️ Satellite": satellite, "⛰️ Topografica": topo}, {"🔥 Incendi Attivi": firesLayer}, {collapsed: false}).addTo(map);

    // Legenda a Destra
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'info legend');
        div.innerHTML = `
            <b>INTENSITÀ INCENDIO</b>
            <div><i style="background:#c0392b"></i> Critico (>330K)</div>
            <div><i style="background:#e67e22"></i> Elevato (315-330K)</div>
            <div><i style="background:#f1c40f"></i> Moderato (<315K)</div>
            <hr>
            <div><i class="fas fa-fire" style="color:#ff4500; background:none;"></i> Segnalazione NASA</div>
        `;
        return div;
    };
    legend.addTo(map);

    function toDMS(deg, pos, neg) {
        const abs = Math.abs(deg);
        const d = Math.floor(abs), m = Math.floor((abs-d)*60), s = ((abs-d-m/60)*3600).toFixed(1);
        return `${d}°${m}'${s}"${deg >= 0 ? pos : neg}`;
    }

    async function loadFires() {
        try {
            const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1')}`);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            let count = 0;

            firesLayer.clearLayers();

            rows.forEach(row => {
                const col = row.split(',');
                if (col.length < 3) return;

                const lat = parseFloat(col[0]), lon = parseFloat(col[1]), temp = parseFloat(col[2]);

                // Filtro confini Italia approssimativo
                if (lat > 35.4 && lat < 47.1 && lon > 6.6 && lon < 18.6) {
                    count++;
                    
                    // DETERMINAZIONE COLORE REALE IMMEDIATA
                    let color = "#f1c40f"; // Giallo (Moderato)
                    if (temp > 315) color = "#e67e22"; // Arancio (Elevato)
                    if (temp > 330) color = "#c0392b"; // Rosso (Critico)

                    const marker = L.marker([lat, lon], {
                        icon: L.divIcon({
                            html: `<div class="fire-pulse" style="background:${color}44; border:2px solid ${color}"></div><i class="fas fa-fire" style="color:${color}; font-size:18px; position:relative; z-index:10;"></i>`,
                            className: 'custom-fire', iconSize: [20, 20], iconAnchor: [10, 10]
                        })
                    }).addTo(firesLayer);

                    marker.bindPopup(`
                        <div style="min-width:160px">
                            <b>SITO:</b> Incendio Boschivo<br>
                            <b>AREA:</b> ~14 ettari<br>
                            <b>COORDS:</b> ${toDMS(lat,'N','S')} ${toDMS(lon,'E','W')}<br>
                            <b>POTENZA:</b> ${temp} K
                        </div>
                    `);
                }
            });

            document.getElementById('count').innerText = `${count} Alert Operativi`;
            document.getElementById('area-est').innerText = `Superficie colpita stimata: ${(count * 14.06).toFixed(2)} ha`;
        } catch (e) {
            console.error("Errore caricamento dati NASA");
        }
    }

    function checkAuth() {
        if(document.getElementById('operator-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<span style='color:#2ecc71; font-weight:bold;'>✓ OPERATIVO</span>";
        } else {
            alert("Codice Operatore Errato");
        }
    }

    loadFires();
    setInterval(loadFires, 600000); // Aggiorna ogni 10 minuti
</script>
</body>
</html>
