<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrale Operativa Incendi - Cloud Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        header { height: 60px; background: #2c3e50; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #map { height: calc(100vh - 60px); width: 100%; background: #cbd2d8; }
        .login-box input { padding: 8px; border-radius: 4px; border: none; margin-right: 5px; }
        .login-box button { padding: 8px 15px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .legend { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2); line-height: 20px; font-size: 13px; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; }
    </style>
</head>
<body>

<header>
    <div id="status-text">🔥 <b>CENTRALE OPERATIVA</b>: <span id="count">In attesa login</span></div>
    <div id="login-section" class="login-box">
        <input type="password" id="operator-code" placeholder="Codice">
        <button onclick="checkAuth()">ENTRA</button>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const map = L.map('map').setView([43.5, 12.0], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const manualLayer = L.layerGroup().addTo(map);
    const nasaLayer = L.layerGroup().addTo(map);

    window.checkAuth = function() {
        const code = document.getElementById('operator-code').value;
        if (code === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ STAFF GABRIELE</b>";
            loadNasaData();
            attivaCloud();
            aggiungiLegenda();
        } else { alert("Codice Errato"); }
    };

    function attivaCloud() {
        onSnapshot(collection(db, "segnalazioni"), (snapshot) => {
            manualLayer.clearLayers();
            snapshot.forEach((docSnap) => {
                const s = docSnap.data();
                const iconViola = L.divIcon({
                    html: '<i class="fas fa-camera" style="color:#9b59b6; font-size:20px;"></i>',
                    className: 'm-icon'
                });
                L.marker([s.lat, s.lon], {icon: iconViola}).addTo(manualLayer).bindPopup(`<b>Segnalazione Cloud</b><br>${s.desc}`);
            });
            aggiornaLabel();
        });
    }

    async function loadNasaData() {
    // Coordinate chirurgiche solo per l'Italia
    // Ovest: 6.6, Sud: 35.4, Est: 18.6, Nord: 47.1
    const areaItalia = "6.6,35.4,18.6,47.1"; 
    const url = `https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/${areaItalia}/1`;
    
    try {
        const res = await fetch(url);
        const csv = await res.text();
        nasaLayer.clearLayers();
        
        const righe = csv.split('\n');
        for (let i = 1; i < righe.length; i++) {
            const c = righe[i].split(',');
            
            // Filtro di sicurezza: Latitudine deve essere tra 35 e 48, Longitudine tra 6 e 19
            if (c.length >= 2) {
                const lat = parseFloat(c[0]);
                const lon = parseFloat(c[1]);
                const bright = parseFloat(c[2]);

                if (!isNaN(lat) && !isNaN(lon) && lat > 35 && lat < 48 && lon > 6 && lon < 19) {
                    const celsius = (bright - 273.15).toFixed(1);
                    const colore = celsius > 50 ? '#d73027' : '#fdae61';
                    
                    L.marker([lat, lon], {
                        icon: L.divIcon({
                            html: `<i class="fas fa-fire" style="color:${colore}; font-size:18px;"></i>`,
                            className: 'f-icon'
                        })
                    }).addTo(nasaLayer).bindPopup(`<b>🔥 Solo Italia</b><br>Temp: ${celsius}°C`);
                }
            }
        }
        aggiornaLabel();
    } catch (e) { 
        console.error("Errore NASA"); 
    }
}

    function aggiornaLabel() {
        document.getElementById('count').innerText = `${nasaLayer.getLayers().length} Satelliti + ${manualLayer.getLayers().length} Cloud`;
    }

    function aggiungiLegenda() {
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>LEGENDA</b><br>' +
                '<i class="fas fa-fire" style="color:#d73027"></i> Incendio Intenso<br>' +
                '<i class="fas fa-fire" style="color:#fdae61"></i> Focolaio Moderato<br>' +
                '<i class="fas fa-camera" style="color:#9b59b6"></i> Segnalazione Cloud';
            return div;
        };
        legend.addTo(map);
    }

    // Abilita l'invio cliccando sulla mappa dopo il login
    map.on('click', async (e) => {
        const code = document.getElementById('operator-code');
        if (!code) { // Se il login è fatto, l'elemento sparisce
            const desc = prompt("Cosa vedi in questo punto?");
            if (desc) {
                await addDoc(collection(db, "segnalazioni"), {
                    lat: e.latlng.lat, lon: e.latlng.lng, desc: desc, ora: new Date().toLocaleString()
                });
            }
        }
    });
</script>
</body>
</html>
