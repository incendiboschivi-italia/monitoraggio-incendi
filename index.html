<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - SISTEMA INTEGRATO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; overflow: hidden; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #333; z-index: 1001; position: relative; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .stats { font-weight: bold; line-height: 1.2; }
        .area-info { font-size: 0.75em; color: #ffa500; display: block; }
        
        .legend { background: rgba(255,255,255,0.95); padding: 12px; border-radius: 8px; line-height: 1.5; font-size: 11px; box-shadow: 0 0 15px rgba(0,0,0,0.4); color: #333; }
        .legend b { display: block; margin-bottom: 5px; border-bottom: 1px solid #ddd; color: #000; }
        .legend i { width: 14px; height: 14px; display: inline-block; margin-right: 8px; border-radius: 3px; vertical-align: middle; }

        .fire-marker { width: 30px !important; height: 30px !important; display: flex; align-items: center; justify-content: center; }

        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.5); opacity: 0.1; } 100% { transform: scale(0.8); opacity: 0.8; } }
        .pulse { width: 34px; height: 34px; border-radius: 50%; position: absolute; animation: pulse 1.8s infinite; pointer-events: none; }

        .btn-news { background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-refresh { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="stats">
        🇮🇹 MONITORAGGIO ITALIA: <span id="count">...</span>
        <span class="area-info" id="area">Inizializzazione sistema...</span>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-news" onclick="openNews()">NOTIZIE RAPIDE</button>
        <button class="btn-refresh" onclick="loadFires()"><i class="fas fa-sync"></i> REFRESH</button>
        <div id="login-zone">
            <input type="password" id="op-code" placeholder="Codice" style="padding:7px; border-radius:4px; border:1px solid #444; background:#333; color:white; width:80px;">
            <button onclick="checkAuth()" style="padding: 7px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">ENTRA</button>
        </div>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');
    
    const map = L.map('map', { center: [42.0, 12.5], zoom: 6, layers: [sat] });
    const firesLayer = L.layerGroup().addTo(map);

    const baseLayers = { "🛰️ Vista Satellitare": sat, "⛰️ Mappa Topografica": topo };
    L.control.layers(baseLayers, null, {collapsed: false, position: 'topright'}).addTo(map);

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `
            <b>LIVELLO TERMICO (°C)</b>
            <div><i style="background: #e74c3c"></i> Critico (> 67°C)</div>
            <div><i style="background: #e67e22"></i> Elevato (52°C - 67°C)</div>
            <div><i style="background: #f1c40f"></i> Moderato (< 52°C)</div>
            <hr style="margin:8px 0; border:0; border-top:1px solid #ddd;">
            <div style="font-size:10px; color:#666;"><i class="fas fa-fire" style="background:none; color:#ff4500; width:auto;"></i> Dato VIIRS NASA</div>
        `;
        return div;
    };
    legend.addTo(map);

    // BLACKLIST RAFFINERIE E SITI INDUSTRIALI (Falsi positivi termici)
    const blacklist = [
        {lat: 37.1, lon: 15.2}, // Priolo
        {lat: 44.9, lon: 8.8},  // Sannazzaro de' Burgondi
        {lat: 40.6, lon: 14.9}, // Salerno Area Ind.
        {lat: 42.1, lon: 12.0}, // Civitavecchia
        {lat: 45.4, lon: 12.2}  // Porto Marghera
    ];

    function isBlacklisted(lat, lon) {
        return blacklist.some(site => Math.abs(site.lat - lat) < 0.15 && Math.abs(site.lon - lon) < 0.15);
    }

    function toDMS(deg, p, n) {
        const d = Math.floor(Math.abs(deg));
        const m = Math.floor((Math.abs(deg) - d) * 60);
        const s = ((Math.abs(deg) - d - m/60) * 3600).toFixed(1);
        return `${d}°${m}'${s}"${deg >= 0 ? p : n}`;
    }

    async function loadFires() {
        document.getElementById('area').innerText = "Analisi territorio nazionale...";
        try {
            const url = "https://corsproxy.io/?" + encodeURIComponent("https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1");
            const response = await fetch(url);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            let activeFires = 0;

            firesLayer.clearLayers();

            rows.forEach(row => {
                const data = row.split(',');
                if (data.length < 3) return;
                const lat = parseFloat(data[0]), lon = parseFloat(data[1]);
                const tempK = parseFloat(data[2]);
                const tempC = (tempK - 273.15).toFixed(1);

                // FILTRO CONFINI ITALIA + BLACKLIST RAFFINERIE
                if (lat > 35.5 && lat < 47.5 && lon > 6.5 && lon < 18.5 && !isBlacklisted(lat, lon)) {
                    activeFires++;
                    let color = "#f1c40f"; 
                    if (tempC > 52) color = "#e67e22"; 
                    if (tempC > 67) color = "#e74c3c"; 

                    const marker = L.marker([lat, lon], {
                        icon: L.divIcon({
                            className: 'fire-marker',
                            iconSize: [30, 30],
                            iconAnchor: [15, 15],
                            html: `<div class="pulse" style="background: ${color}55; border: 1px solid ${color}"></div><i class="fas fa-fire" style="color: ${color}; font-size: 18px; position: relative; z-index:10; text-shadow: 0 0 3px black;"></i>`
                        })
                    }).addTo(firesLayer);

                    marker.bindPopup(`
                        <div style="font-size:12px; line-height:1.4;">
                            <b style="color:#d35400;">⚠️ ALERT INCENDIO</b><hr>
                            <b>SITO:</b> Area Boschiva / Vegetazione<br>
                            <b>TEMP:</b> ${tempC}°C<br>
                            <b>COORDS:</b> ${toDMS(lat, 'N', 'S')} ${toDMS(lon, 'E', 'W')}<br>
                            <b>AREA:</b> ~14.06 ha
                        </div>
                    `);
                }
            });
            document.getElementById('count').innerText = `${activeFires} Alert Operativi`;
            document.getElementById('area').innerText = `Superficie totale stimata: ${(activeFires * 14.06).toFixed(2)} ha`;
        } catch (e) { 
            document.getElementById('area').innerText = "Errore connessione NASA.";
            console.log("Errore:", e); 
        }
    }

    function openNews() {
        const choice = prompt("1-Vigilfuoco | 2-Prot. Civile | 3-AIB | 4-Meteo Aeronautica", "1");
        const urls = {
            "1": "https://www.vigilfuoco.it/media/notizie/dal-territorio",
            "2": "https://www.iononrischio.gov.it",
            "3": "http://www.pcn.minambiente.it",
            "4": "http://www.meteoam.it"
        };
        if(urls[choice]) window.open(urls[choice], '_blank');
    }

    function checkAuth() {
        if(document.getElementById('op-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-zone').innerHTML = "<b style='color:#2ecc71'>⭐ OPERATIVO</b>";
        } else { alert("Accesso negato"); }
    }

    loadFires();
    setInterval(loadFires, 600000);
</script>
</body>
</html>
