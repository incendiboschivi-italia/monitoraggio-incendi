<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centrale Operativa Italia - PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #333; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        .login-box input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; margin-right: 5px; width: 150px; }
        .login-box button { padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .legend { background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 10px; color: black; font-size: 13px; line-height: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.6); }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 10px; text-align: center; }
        #stat { font-weight: bold; font-size: 1.1em; color: #fff; }
        .f-icon { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div id="stat">🇮🇹 CENTRALE ITALIA: <span id="count">Inserire Codice</span></div>
    <div id="login-section" class="login-box">
        <input type="password" id="operator-code" placeholder="Codice Operatore">
        <button onclick="checkAuth()">ENTRA</button>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const map = L.map('map').setView([40.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const nasaLayer = L.layerGroup().addTo(map);
    const cloudLayer = L.layerGroup().addTo(map);

    // Database Siti Noti (Falsi Positivi)
    const blackList = [
        {lat: 37.75, lon: 14.99, type: "volcano", name: "Etna"},
        {lat: 38.79, lon: 15.21, type: "volcano", name: "Stromboli"},
        {lat: 38.20, lon: 15.24, type: "industry", name: "Raffineria di Milazzo (Sicilia)"},
        {lat: 39.09, lon: 9.01,  type: "industry", name: "Raffineria Sarroch (Sardegna)"}, // Aggiunta Sardegna
        {lat: 40.48, lon: 17.22, type: "industry", name: "Taranto (Ex Ilva)"},
        {lat: 37.13, lon: 15.18, type: "industry", name: "Priolo (Sicilia)"},
        {lat: 45.45, lon: 12.23, type: "industry", name: "Porto Marghera"}
    ];

    window.checkAuth = function() {
        if (document.getElementById('operator-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ OPERATIVO</b>";
            loadNasaData();
            loadCloudData();
            addLegend();
        } else { alert("Codice Errato"); }
    };

    async function loadNasaData() {
        try {
            const res = await fetch(`https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1`);
            const csv = await res.text();
            const lines = csv.split('\n');
            let nReal = 0;
            nasaLayer.clearLayers();

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(',');
                if (c.length < 3) continue;
                const lat = parseFloat(c[0]);
                const lon = parseFloat(c[1]);
                const temp = (parseFloat(c[2]) - 273.15).toFixed(0);

                let inArea = (lat > 36.5 && lat < 47.1) && (lon > 6.6 && lon < 18.5);
                // Filtro "Muri di confine" (No Corsica, No Svizzera, No Balcani)
                if (lat > 46.55 || (lon > 13.6 && lat > 42.0) || (lon < 9.7 && lat > 41.3 && lat < 43.1)) inArea = false;

                if (inArea) {
                    let isKnown = false;
                    let siteName = "";
                    let iconHtml = "";
                    let popupContent = "";

                    blackList.forEach(point => {
                        const d = Math.sqrt(Math.pow(lat - point.lat, 2) + Math.pow(lon - point.lon, 2));
                        if (d < 0.06) {
                            isKnown = true;
                            siteName = point.name;
                            if (point.type === "volcano") {
                                iconHtml = `<i class="fas fa-volcano" style="color:#e67e22; font-size:18px;"></i>`;
                                popupContent = `<b>🌋 ATTIVITÀ VULCANICA: ${siteName.toUpperCase()}</b><br>Rilevamento termico satellitare.<br>Non è un incendio.<br><i>Temp: ${temp}°C</i>`;
                            } else {
                                iconHtml = `<i class="fas fa-gear" style="color:#3498db; font-size:18px;"></i>`;
                                popupContent = `<b>⚙️ SITO INDUSTRIALE: ${siteName.toUpperCase()}</b><br>Raffineria/Industria nota.<br>Non è un incendio boschivo.<br><i>Temp: ${temp}°C</i>`;
                            }
                        }
                    });

                    if (!isKnown) {
                        iconHtml = `<i class="fas fa-fire" style="color:${temp > 60 ? '#d73027' : '#fdae61'}; font-size:16px;"></i>`;
                        popupContent = `<b>🔥 INCENDIO BOSCHIVO</b><br>Temperatura: ${temp}°C`;
                        nReal++;
                    }

                    L.marker([lat, lon], { icon: L.divIcon({ html: iconHtml, className: 'f-icon' }) })
                     .addTo(nasaLayer).bindPopup(popupContent);
                }
            }
            document.getElementById('count').innerText = `${nReal} Incendi Boschivi`;
        } catch (e) { console.error("Errore dati"); }
    }

    function loadCloudData() {
        onSnapshot(query(collection(db, "segnalazioni"), orderBy("timestamp", "desc")), (snap) => {
            cloudLayer.clearLayers();
            snap.forEach(doc => {
                const d = doc.data();
                L.marker([d.lat, d.lon], { icon: L.divIcon({ html: `<i class="fas fa-camera" style="color:purple; font-size:18px;"></i>`, className: 'c-icon' }) })
                 .addTo(cloudLayer).bindPopup(`<b>Segnalazione Cloud:</b><br>${d.desc}`);
            });
        });
    }

    function addLegend() {
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>LEGENDA OPERATIVA</b><br>' +
                            '<i class="fas fa-fire" style="color:#d73027"></i> Incendio Boschivo<br>' +
                            '<i class="fas fa-gear" style="color:#3498db"></i> Raffineria / Industria<br>' +
                            '<i class="fas fa-volcano" style="color:#e67e22"></i> Attività Vulcanica<br>' +
                            '<i class="fas fa-camera" style="color:purple"></i> Segnalazione Cloud';
            return div;
        };
        legend.addTo(map);
    }
</script>
</body>
</html>
