<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #333; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        .login-box input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; margin-right: 5px; width: 150px; }
        .login-box button { padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .legend { background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 10px; color: black; font-size: 13px; box-shadow: 0 0 15px rgba(0,0,0,0.6); }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 10px; text-align: center; }
        #stat { font-weight: bold; font-size: 1.1em; color: #fff; display: flex; align-items: center; }
        #stat span.flag { margin-right: 10px; font-size: 1.3em; } 
        .f-icon { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div id="stat"><span class="flag">🇮🇹</span> MONITORAGGIO INCENDI ITALIA: <span id="count">Caricamento...</span></div>
    <div id="login-section" class="login-box">
        <input type="password" id="operator-code" placeholder="Codice Operatore">
        <button onclick="checkAuth()">ENTRA</button>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const nasaLayer = L.layerGroup().addTo(map);
    const cloudLayer = L.layerGroup().addTo(map);

    // BLACKLIST RIMOZIONE TOTALE (Tutti i siti industriali e vulcani rimossi)
    const blacklist = [
        {lat: 45.10, lon: 7.51,  name: "Ferriere Nord Rivoli"},
        {lat: 45.45, lon: 10.49, name: "Feralpi Siderurgica Lonato"},
        {lat: 45.47, lon: 10.22, name: "Duferco San Zeno/Colombo"},
        {lat: 45.15, lon: 9.97,  name: "Oleificio Zucchi Cavatigozzi"},
        {lat: 45.64, lon: 9.61,  name: "Tenaris-Dalmine"},
        {lat: 45.72, lon: 9.47,  name: "Italcementi Calusco d'Adda"},
        {lat: 45.79, lon: 8.70,  name: "Holcim Italia Ternate"},
        {lat: 45.38, lon: 11.92, name: "Acciaierie Venete"},
        {lat: 40.58, lon: 9.71,  name: "Zona Industriale Siniscola"},
        {lat: 39.20, lon: 8.39,  name: "Portovesme"}, 
        {lat: 40.59, lon: 18.03, name: "Enipower Brindisi"}, 
        {lat: 37.20, lon: 15.17, name: "Sonatrach Augusta"}, 
        {lat: 37.13, lon: 15.18, name: "Priolo"},
        {lat: 37.75, lon: 14.99, name: "Etna"},
        {lat: 38.79, lon: 15.21, name: "Stromboli"},
        {lat: 38.20, lon: 15.24, name: "Milazzo"},
        {lat: 39.09, lon: 9.01,  name: "Sarroch"},
        {lat: 40.48, lon: 17.22, name: "Taranto"},
        {lat: 45.45, lon: 12.23, name: "Marghera"},
        {lat: 44.91, lon: 8.82,  name: "Sannazzaro"},
        {lat: 43.58, lon: 10.33, name: "Livorno"}
    ];

    // CARICAMENTO AUTOMATICO ALL'AVVIO
    window.onload = () => {
        loadNasaData();
        loadCloudData();
        addLegend();
    };

    window.checkAuth = function() {
        if (document.getElementById('operator-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ OPERATIVO</b>";
            // L'accesso abilita ora la possibilità di cliccare sulla mappa per segnalare
        } else { alert("Codice Errato"); }
    };

    async function loadNasaData() {
        try {
            const res = await fetch(`https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1`);
            const csv = await res.text();
            const lines = csv.split('\n');
            let nReal = 0;
            nasaLayer.clearLayers();

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(',');
                if (c.length < 3) continue;
                const lat = parseFloat(c[0]);
                const lon = parseFloat(c[1]);
                const temp = (parseFloat(c[2]) - 273.15).toFixed(0);

                // FILTRO GEOGRAFICO (Muro Sud 37.0 per tagliare Africa)
                let inArea = (lat > 37.0 && lat < 47.1) && (lon > 6.6 && lon < 18.5);
                if (lat > 46.55) inArea = false;
                if (lon < 9.7 && lat > 41.3 && lat < 43.1) inArea = false;
                if (lon > 13.6 && lat > 42.0) inArea = false;

                if (inArea) {
                    let shouldSkip = false;
                    blacklist.forEach(site => {
                        const d = Math.sqrt(Math.pow(lat - site.lat, 2) + Math.pow(lon - site.lon, 2));
                        if (d < 0.08) shouldSkip = true; 
                    });

                    if (shouldSkip) continue;

                    nReal++;
                    let iconHtml = `<i class="fas fa-fire" style="color:${temp > 60 ? '#d73027' : '#fdae61'}; font-size:16px;"></i>`;
                    let popupContent = `<b>🔥 INCENDIO BOSCHIVO</b><br>Temperatura rilevata: ${temp}°C`;

                    L.marker([lat, lon], { icon: L.divIcon({ html: iconHtml, className: 'f-icon' }) })
                     .addTo(nasaLayer).bindPopup(popupContent);
                }
            }
            document.getElementById('count').innerText = `${nReal} Incendi in Italia`;
        } catch (e) { console.error("Errore caricamento NASA"); }
    }

    function loadCloudData() {
        onSnapshot(query(collection(db, "segnalazioni"), orderBy("timestamp", "desc")), (snap) => {
            cloudLayer.clearLayers();
            snap.forEach(doc => {
                const d = doc.data();
                L.marker([d.lat, d.lon], { icon: L.divIcon({ html: `<i class="fas fa-camera" style="color:purple; font-size:18px;"></i>`, className: 'c-icon' }) })
                 .addTo(cloudLayer).bindPopup(`<b>Segnalazione Staff:</b><br>${d.desc}`);
            });
        });
    }

    function addLegend() {
        if (document.querySelector('.legend')) return;
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>LEGENDA</b><br>' +
                            '<i class="fas fa-fire" style="color:#d73027"></i> Incendio Boschivo<br>' +
                            '<i class="fas fa-camera" style="color:purple"></i> Segnalazione Staff';
            return div;
        };
        legend.addTo(map);
    }

    map.on('click', async (e) => {
        // Il click funziona solo se l'utente è loggato come staff
        if (document.getElementById('login-section').innerHTML.includes("OPERATIVO")) {
            const desc = prompt("Descrizione evento:");
            if (desc) await addDoc(collection(db, "segnalazioni"), { lat: e.latlng.lat, lon: e.latlng.lng, desc: desc, timestamp: new Date() });
        }
    });
</script>
</body>
</html>
