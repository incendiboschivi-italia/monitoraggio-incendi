<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAGGIO INCENDI ITALIA - PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }
        header { height: 60px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #333; }
        #map { height: calc(100vh - 60px); width: 100%; background: #222; }
        .login-box { display: flex; align-items: center; }
        .btn-news { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 15px; }
        .btn-login { padding: 8px 15px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .legend { background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 10px; color: black; font-size: 13px; box-shadow: 0 0 15px rgba(0,0,0,0.6); }
        #stat { font-weight: bold; font-size: 1.1em; color: #fff; }
    </style>
</head>
<body>

<header>
    <div id="stat">🇮🇹 MONITORAGGIO ITALIA: <span id="count">Inizializzazione...</span></div>
    <div class="login-box">
        <button class="btn-news" onclick="window.open('https://www.vigilfuoco.tv/notizie')">NOTIZIE RAPIDE</button>
        <div id="login-section">
            <input type="password" id="operator-code" placeholder="Codice" style="padding:8px; border-radius:4px; border:1px solid #444; background:#333; color:white; width:100px; margin-right: 5px;">
            <button class="btn-login" onclick="checkAuth()">ENTRA</button>
        </div>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClmNoNbNpxk5IjB9LsrQvWqPI1YodxY9E",
        authDomain: "monitoraggioincendi-41f5f.firebaseapp.com",
        projectId: "monitoraggioincendi-41f5f",
        storageBucket: "monitoraggioincendi-41f5f.firebasestorage.app",
        messagingSenderId: "63942195354",
        appId: "1:63942195354:web:cc5bb978858676c6748723"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const nasaLayer = L.layerGroup().addTo(map);
    const cloudLayer = L.layerGroup().addTo(map);
    
    const blacklist = [{lat:45.1,lon:7.51},{lat:45.45,lon:10.49},{lat:37.5,lon:15.0},{lat:44.29,lon:8.44}];

    async function loadNasaData() {
        try {
            const res = await fetch(`https://corsproxy.io/?https://firms.modaps.eosdis.nasa.gov/api/area/csv/6c7f29542d837e182b0bf7292cb52b99/VIIRS_SNPP_NRT/world/1`);
            const csv = await res.text();
            const lines = csv.split('\n');
            let nReal = 0;
            nasaLayer.clearLayers();

            for (let i = 1; i < lines.length; i++) {
                const c = lines[i].split(',');
                if (c.length < 3) continue;
                const lat = parseFloat(c[0]);
                const lon = parseFloat(c[1]);

                // --- LOGICA SCUDO ITALIA (INTEGRATA) ---
                let inArea = false;

                // 1. NORD (Taglio Svizzera/Slovenia)
                if (lat > 44.0 && lat < 47.1) {
                    if (lon > 6.6 && lon < 13.6) inArea = true;
                }
                // 2. CENTRO-SUD (Taglio Balcani/Bosnia)
                else if (lat > 37.5 && lat <= 44.0) {
                    if (lon > 8.0 && lon < 18.0) inArea = true;
                }
                // 3. SICILIA (Taglio Chirurigo Anti-Tunisia)
                else if (lat > 36.5 && lat <= 37.5) {
                    if (lon > 12.1 && lon < 15.6) inArea = true;
                }
                // 4. SARDEGNA
                else if (lat > 38.8 && lat < 41.3 && lon > 8.0 && lon < 10.0) {
                    inArea = true;
                }

                if (inArea) {
                    let skip = false;
                    blacklist.forEach(s => { 
                        if(Math.sqrt(Math.pow(lat-s.lat,2)+Math.pow(lon-s.lon,2)) < 0.05) skip=true; 
                    });
                    if(skip) continue;

                    nReal++;
                    L.marker([lat, lon], { 
                        icon: L.divIcon({ html: `<i class="fas fa-fire" style="color:#d73027; font-size:16px;"></i>`, className: 'f-icon' }) 
                    }).addTo(nasaLayer);
                }
            }
            document.getElementById('count').innerText = `${nReal} Incendi in Italia`;
        } catch (e) { console.error("Errore NASA"); }
    }

    function loadCloudData() {
        onSnapshot(query(collection(db, "segnalazioni"), orderBy("timestamp", "desc")), (snap) => {
            cloudLayer.clearLayers();
            snap.forEach(doc => {
                const d = doc.data();
                L.marker([d.lat, d.lon], { icon: L.divIcon({ html: `<i class="fas fa-camera" style="color:purple; font-size:18px;"></i>`, className: 'c-icon' }) })
                 .addTo(cloudLayer).bindPopup(`<b>Staff:</b><br>${d.desc}`);
            });
        });
    }

    window.checkAuth = () => {
        if (document.getElementById('operator-code').value === "GABRIELE_STAFF") {
            document.getElementById('login-section').innerHTML = "<b style='color:#2ecc71'>⭐ OPERATIVO</b>";
        } else { alert("Codice errato"); }
    };

    map.on('click', async (e) => {
        if (document.getElementById('login-section').innerHTML.includes("OPERATIVO")) {
            const desc = prompt("Inserisci descrizione incendio:");
            if (desc) await addDoc(collection(db, "segnalazioni"), { lat: e.latlng.lat, lon: e.latlng.lng, desc: desc, timestamp: new Date() });
        }
    });

    window.onload = () => {
        loadNasaData();
        loadCloudData();
        setInterval(loadNasaData, 600000); // 10 min
    };
</script>
</body>
</html>
